                    <div class="form-section">
                        <label class="form-label">Date *</label>
                        <input type="date" class="form-input" id="ppVisitDate" value="${tomorrowStr}">
                    </div>
                    <div class="form-section">
                        <label class="form-label">Heure</label>
                        <input type="time" class="form-input" id="ppVisitTime">
                    </div>
                </div>

                <div class="form-section">
                    <label class="form-label">Note</label>
                    <textarea class="form-textarea" id="ppVisitNote" rows="2" placeholder="Remarques...">${req.visitor_message ? escapeHtml(req.visitor_message) : ''}</textarea>
                </div>

                <div class="form-section">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; color:var(--text-dark)">
                        <input type="checkbox" id="ppCreateBuyer" checked>
                        Créer un lead acquéreur
                    </label>
                </div>

                <button type="button" class="submit-btn" id="ppSubmitBtn" onclick="submitPortalPlan('${req.id}')">Planifier la visite</button>
                <button type="button" class="cancel-btn" onclick="closeModal('portalPlanModal')">Annuler</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.addEventListener('click', function(e) { if (e.target === modal) closeModal('portalPlanModal'); });

        // Setup autocomplete pour le bien
        setupPortalSellerAutocomplete('ppSellerSearch', 'ppSellerDropdown', 'ppSelectedSellerId');
    }

    function setupPortalSellerAutocomplete(inputId, dropdownId, hiddenId) {
        const input = document.getElementById(inputId);
        const dropdown = document.getElementById(dropdownId);
        if (!input || !dropdown) return;

        let timer = null;
        input.addEventListener('input', function() {
            clearTimeout(timer);
            const q = this.value.trim().toLowerCase();
            document.getElementById(hiddenId).value = '';
            if (q.length < 2) { dropdown.classList.remove('active'); return; }

            timer = setTimeout(() => {
                const results = activeSellers.filter(s => {
                    const name = ((s.first_name || '') + ' ' + (s.last_name || '')).toLowerCase();
                    const addr = (s.address || '').toLowerCase();
                    return name.includes(q) || addr.includes(q);
                }).slice(0, 8);

                if (results.length === 0) { dropdown.classList.remove('active'); return; }

                dropdown.innerHTML = results.map(s => {
                    const name = [(s.first_name || ''), (s.last_name || '')].filter(Boolean).join(' ');
                    const addr = s.address || '';
                    return `<div class="ac-option" data-id="${s.id}">
                        <div class="ac-option-name">${escapeHtml(name)}</div>
                        <div class="ac-option-addr">${escapeHtml(addr)}</div>
                    </div>`;
                }).join('');
                dropdown.classList.add('active');

                dropdown.querySelectorAll('.ac-option').forEach(opt => {
                    opt.addEventListener('click', function() {
                        const sid = this.dataset.id;
                        const s = activeSellers.find(x => x.id === sid);
                        if (s) {
                            input.value = [(s.first_name || ''), (s.last_name || '')].filter(Boolean).join(' ')
                                + (s.address ? ' — ' + s.address : '');
                            document.getElementById(hiddenId).value = sid;
                        }
                        dropdown.classList.remove('active');
                    });
                });
            }, 200);
        });

        document.addEventListener('click', function(e) {
            if (!input.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.remove('active');
        });
    }

    async function submitPortalPlan(requestId) {
        const sellerId = document.getElementById('ppSelectedSellerId').value;
        if (!sellerId) {
            alert('Veuillez sélectionner un bien.');
            return;
        }
        const visitDate = document.getElementById('ppVisitDate').value;
        if (!visitDate) {
            alert('Veuillez renseigner une date.');
            return;
        }

        const btn = document.getElementById('ppSubmitBtn');
        btn.disabled = true;
        btn.textContent = 'Planification...';

        const headers = {};
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) headers['Authorization'] = 'Bearer ' + session.access_token;

        try {
            const resp = await fetch('/api/assistant', {
                method: 'POST',
                headers: { ...headers, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'process_visit_request',
                    request_id: requestId,
                    decision: 'accept',
                    seller_id: sellerId,
                    visit_date: visitDate,
                    visit_time: document.getElementById('ppVisitTime').value || null,
                    note: document.getElementById('ppVisitNote').value.trim() || null,
                    create_buyer: document.getElementById('ppCreateBuyer').checked
                })
            });

            if (resp.ok) {
                const data = await resp.json();
                closeModal('portalPlanModal');
                showToast(data.buyer_id ? 'Visite planifiée + lead créé !' : 'Visite planifiée !');
                portalRequests = portalRequests.filter(r => r.id !== requestId);
                renderPortalBanner();
                allVisits = await loadAllVisits();
                renderVisitsPage();
            } else {
                showToast('Erreur lors de la planification');
                btn.disabled = false;
                btn.textContent = 'Planifier la visite';
            }
        } catch (e) {
            console.error('[Visites] Portal plan error:', e);
            showToast('Erreur réseau');
            btn.disabled = false;
            btn.textContent = 'Planifier la visite';
        }
    }

    // ===== MODAL TRAITÉE (avec note + chips + option créer lead) =====
    function openPortalProcessedModal(requestId) {
        const req = portalRequests.find(r => r.id === requestId);
        if (!req) return;

        closeModal('portalProcessedModal');
        const seller = req.sellers;

        const modal = document.createElement('div');
        modal.id = 'portalProcessedModal';
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-card" style="max-width:440px">
                <div class="modal-title">Marquer comme traitée</div>

                <div style="background:#F9FAFB; border-radius:10px; padding:12px; margin-bottom:14px; font-size:13px;">
                    <strong>${escapeHtml(req.visitor_name || 'Visiteur')}</strong>
                    ${req.visitor_phone ? ' — ' + escapeHtml(req.visitor_phone) : ''}
                    ${seller ? '<br><span style="color:var(--text-light)">Bien : ' + escapeHtml(seller.address || '?') + '</span>' : ''}
                </div>

                <div class="form-section">
                    <label class="form-label">Note</label>
                    <div class="note-chips">
                        <span class="note-chip" onclick="selectNoteChip(this)">Visite virtuelle envoyée</span>
                        <span class="note-chip" onclick="selectNoteChip(this)">Message répondeur</span>
                        <span class="note-chip" onclick="selectNoteChip(this)">Rappeler</span>
                        <span class="note-chip" onclick="selectNoteChip(this)">Pas intéressé</span>
                    </div>
                    <textarea class="form-textarea" id="procNote" rows="2" placeholder="Ajouter une note..."></textarea>
                </div>

                <div class="form-section">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; color:var(--text-dark)">
                        <input type="checkbox" id="procCreateBuyer">
                        Créer un lead acquéreur
                    </label>
                </div>

                <button type="button" class="submit-btn" id="procSubmitBtn" style="background:linear-gradient(135deg, #2E7D32, #43A047)" onclick="submitPortalProcessed('${req.id}')">Valider</button>
                <button type="button" class="cancel-btn" onclick="closeModal('portalProcessedModal')">Annuler</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.addEventListener('click', function(e) { if (e.target === modal) closeModal('portalProcessedModal'); });
    }

    function selectNoteChip(chip) {
        chip.classList.toggle('selected');
        const textarea = document.getElementById('procNote');
        const selectedChips = document.querySelectorAll('.note-chip.selected');
        const chipTexts = Array.from(selectedChips).map(c => c.textContent);
        const userText = textarea.dataset.userText || '';
        textarea.value = chipTexts.length > 0
            ? chipTexts.join(' / ') + (userText ? '\n' + userText : '')
            : userText;
    }

    async function submitPortalProcessed(requestId) {
        const btn = document.getElementById('procSubmitBtn');
        btn.disabled = true;
        btn.textContent = 'Traitement...';

        const req = portalRequests.find(r => r.id === requestId);
        const seller = req?.sellers;

        const headers = {};
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) headers['Authorization'] = 'Bearer ' + session.access_token;

        try {
            const resp = await fetch('/api/assistant', {
                method: 'POST',
                headers: { ...headers, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'process_visit_request',
                    request_id: requestId,
                    decision: 'processed',
                    seller_id: seller ? seller.id : null,
                    processing_note: document.getElementById('procNote').value.trim() || null,
                    create_buyer: document.getElementById('procCreateBuyer').checked
                })
            });

            if (resp.ok) {
                const data = await resp.json();
                closeModal('portalProcessedModal');
                showToast(data.buyer_id ? 'Traitée + lead créé !' : 'Demande traitée !');
                portalRequests = portalRequests.filter(r => r.id !== requestId);
                renderPortalBanner();
            } else {
                showToast('Erreur lors du traitement');
                btn.disabled = false;
                btn.textContent = 'Valider';
            }
        } catch (e) {
            console.error('[Visites] Processed error:', e);
            showToast('Erreur réseau');
            btn.disabled = false;
            btn.textContent = 'Valider';
        }
    }

    async function deleteProcessedRequest(requestId) {
        if (!confirm('Supprimer cette demande ?')) return;

        try {
            const userId = await getCurrentUserId();
            const { error } = await supabaseClient
                .from('visit_requests')
                .delete()
                .eq('id', requestId)
                .eq('user_id', userId);

            if (error) {
                console.error('[Visites] Delete request error:', error);
                showToast('Erreur lors de la suppression');
                return;
            }

            processedRequests = processedRequests.filter(r => r.id !== requestId);
            renderProcessedView();
            renderVisitsPage(); // MAJ les accordions
            showToast('Demande supprimée');
        } catch (e) {
            console.error('[Visites] Delete error:', e);
            showToast('Erreur réseau');
        }
    }

    function setupFilterListeners() {
        document.getElementById('filterStatus').addEventListener('change', () => renderVisitsPage());
        document.getElementById('filterDateFrom').addEventListener('change', () => renderVisitsPage());
        document.getElementById('filterDateTo').addEventListener('change', () => renderVisitsPage());
        document.getElementById('filterSearch').addEventListener('input', () => {
            clearTimeout(searchDebounce);
            searchDebounce = setTimeout(() => renderVisitsPage(), 250);
        });
        document.getElementById('newVisitBtn').addEventListener('click', () => openVisitModal());
    }

    // ===== INITIALIZATION =====

    document.addEventListener('DOMContentLoaded', async function() {
        console.log('[Visites] Initializing...');

        // Charger les données en parallèle
        const [visits, sellers] = await Promise.all([
            loadAllVisits(),
            loadActiveSellers(),
            loadPortalRequests(),
            loadProcessedRequests(),
            loadVisitRequestStats()
        ]);

        allVisits = visits;
        activeSellers = sellers;

        // Re-matching frontend pour les demandes sans match
        applyFrontendMatching();

        console.log('[Visites] Loaded:', allVisits.length, 'visits,', activeSellers.length, 'sellers,', portalRequests.length, 'portal requests,', processedRequests.length, 'processed');

        renderVisitsPage();
        renderPortalBanner();
        document.getElementById('processedCount').textContent = processedRequests.length;
        setupFilterListeners();
    });
    </script>
</body>
</html>
