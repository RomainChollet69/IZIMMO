    /** Gestion visibilité mobile/desktop */
    function updateMobileVisibility() {
        const mobile = isMobile();
        const mvContainer = document.getElementById('mobileVisitsContainer');
        const mvFab = document.getElementById('mobileFab');
        const desktopContainer = document.getElementById('visitsContainer');

        if (mvContainer) mvContainer.style.display = mobile ? 'block' : 'none';
        if (mvFab) mvFab.style.display = mobile ? 'flex' : 'none';
        if (desktopContainer) desktopContainer.style.display = mobile ? 'none' : 'block';

        // Hide desktop-only elements via JS as backup
        document.querySelectorAll('.page-title-bar, .stats-bar, .filters-bar, .portal-banner, .processed-requests-view').forEach(el => {
            el.style.display = mobile ? 'none' : '';
        });
    }

    // ===== RENDERING =====

    function renderVisitsPage() {
        const filters = getFilters();
        const filtered = filterVisits(allVisits, filters);
        const stats = computeQuickStats(allVisits); // Stats toujours sur toutes les visites

        if (isMobile()) {
            const groups = groupVisitsBySeller(filtered);
            // Ajouter les biens sous mandat vides (property view)
            const hasStatusFilter = filters.status && filters.status !== '';
            if (!hasStatusFilter) {
                activeSellers.forEach(s => {
                    if (s.status !== 'mandate') return;
                    if (!groups[s.id]) {
                        groups[s.id] = {
                            seller: s, visits: [], contacts: [],
                            nextVisit: null, plannedCount: 0, doneCount: 0, contactCount: 0
                        };
                    }
                });
            }
            renderMobileVisitsPage(filtered, stats, groups);
            updateMobileVisibility();
            return;
        }

        updateMobileVisibility();
        renderQuickStats(stats);

        const container = document.getElementById('visitsContainer');

        const groups = groupVisitsBySeller(filtered);

        // Ajouter les biens sous mandat sans visite ni contact (pour pouvoir ajouter des contacts)
        const hasStatusFilter = filters.status && filters.status !== '';
        if (!hasStatusFilter) {
            activeSellers.forEach(s => {
                if (s.status !== 'mandate') return;
                if (!groups[s.id]) {
                    groups[s.id] = {
                        seller: s,
                        visits: [],
                        contacts: [],
                        nextVisit: null,
                        plannedCount: 0,
                        doneCount: 0,
                        contactCount: 0
                    };
                }
            });
        }

        if (Object.keys(groups).length === 0) {
            container.innerHTML = `<div class="visits-empty">
                <i class="fa-solid fa-calendar-check"></i>
                <p>${allVisits.length === 0 ? 'Aucune visite enregistrée' : 'Aucune visite ne correspond aux filtres'}</p>
                <small>${allVisits.length === 0 ? 'Planifiez votre première visite pour commencer' : 'Modifiez vos critères de recherche'}</small>
            </div>`;
            return;
        }

        // Tri : propriétés avec visites planifiées en premier, puis par date de prochaine visite
        const sortedKeys = Object.keys(groups).sort((a, b) => {
            const ga = groups[a], gb = groups[b];
            const totalA = ga.visits.length + ga.contactCount;
            const totalB = gb.visits.length + gb.contactCount;
            // Biens avec visites planifiées en premier
            if (ga.plannedCount > 0 && gb.plannedCount === 0) return -1;
            if (gb.plannedCount > 0 && ga.plannedCount === 0) return 1;
            if (ga.nextVisit && gb.nextVisit) return ga.nextVisit.localeCompare(gb.nextVisit);
            // Biens avec activité avant les biens vides
            if (totalA > 0 && totalB === 0) return -1;
            if (totalB > 0 && totalA === 0) return 1;
            return totalB - totalA;
        });

        let html = '';
        sortedKeys.forEach(key => {
            html += renderPropertyAccordion(key, groups[key]);
        });
        container.innerHTML = html;

        // Re-open previously opened accordions
        openAccordions.forEach(id => {
            const el = document.querySelector(`.property-accordion[data-seller-id="${id}"]`);
            if (el) el.classList.add('open');
        });
    }

    function renderPropertyAccordion(sellerId, group) {
        const seller = group.seller;
        let address = 'Bien non renseigné';
        let sellerName = '';
        let propertyInfo = '';

        if (seller) {
            address = seller.address || 'Adresse inconnue';
            sellerName = [(seller.first_name || ''), (seller.last_name || '')].filter(Boolean).join(' ');
            const type = seller.property_type ? seller.property_type.charAt(0).toUpperCase() + seller.property_type.slice(1) : '';
            const price = seller.budget ? formatEuro(seller.budget) : '';
            propertyInfo = [type, price].filter(Boolean).join(' — ');
        }

        // Photo du bien depuis les link previews
        const photo = seller ? getSellerPhoto(seller) : null;
        const photoHtml = photo
            ? `<div class="accordion-photo"><img src="${escapeHtml(photo)}" onerror="this.parentElement.style.display='none'" alt=""></div>`
            : '';

        const contacts = group.contacts || [];
        const isOpen = openAccordions.has(sellerId);

        // Stats combinées : contacts manuels + visites converties + demandes portail visibles
        // Compter les visites qui viennent d'un contact (ont un contact_source)
        const visitsFromContacts = group.visits.filter(v => v.contact_source);
        // Demandes portail visibles (pending + dismissed avec note, sans accepted pour éviter double-comptage avec visitsFromContacts)
        const sellerPendingCount = portalRequests.filter(r => r.matched_seller_id === sellerId).length;
        const sellerProcessedCount = processedRequests.filter(r => r.matched_seller_id === sellerId && r.status !== 'accepted').length;
        const totalContacts = contacts.length + visitsFromContacts.length + sellerPendingCount + sellerProcessedCount;
        const treatedContacts = contacts.filter(c => c.contact_treated).length + visitsFromContacts.length + sellerProcessedCount;
        const totalVisits = group.visits.filter(v => v.status === 'planifiee' || v.status === 'effectuee').length;

        // Badges droite : seulement les prochaines visites
        let badges = '';
        if (group.plannedCount > 0) {
            const nextDate = new Date(group.nextVisit).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
            badges += `<span class="accordion-badge next">Prochaine : ${nextDate}</span>`;
        }
        if (group.doneCount > 0) {
            badges += `<span class="accordion-badge done-count">${group.doneCount} effectuée${group.doneCount > 1 ? 's' : ''}</span>`;
        }

        // Stats inline (sous les infos du bien, à gauche)
        const inlineStats = [];
        if (totalContacts > 0) inlineStats.push(`<span class="portal-stat-tag"><i class="fa-solid fa-envelope"></i> ${totalContacts} contact${totalContacts > 1 ? 's' : ''}</span>`);
        if (treatedContacts > 0) inlineStats.push(`<span class="portal-stat-tag"><i class="fa-solid fa-check"></i> ${treatedContacts} traité${treatedContacts > 1 ? 's' : ''}</span>`);
        if (totalVisits > 0) inlineStats.push(`<span class="portal-stat-tag"><i class="fa-solid fa-eye"></i> ${totalVisits} visite${totalVisits > 1 ? 's' : ''}</span>`);
        if (group.plannedCount > 0) inlineStats.push(`<span class="portal-stat-tag" style="color:#1565C0"><i class="fa-solid fa-calendar-check"></i> ${group.plannedCount} planifiée${group.plannedCount > 1 ? 's' : ''}</span>`);
        const pendingFeedbackCount = group.visits.filter(v => v.status === 'effectuee' && !v.feedback_rating).length;
        if (pendingFeedbackCount > 0) inlineStats.push(`<span class="portal-stat-tag" style="color:#E65100"><i class="fa-solid fa-clock"></i> ${pendingFeedbackCount} retour${pendingFeedbackCount > 1 ? 's' : ''} en attente</span>`);
        const portalStatsHtml = inlineStats.length > 0 ? `<div class="accordion-portal-stats">${inlineStats.join('')}</div>` : '';

        // Section Contacts : contacts manuels + demandes portail pending matchées + demandes traitées
        let contactCards = '';
        const sellerPending = portalRequests.filter(r => r.matched_seller_id === sellerId);
        const sellerProcessed = processedRequests.filter(r =>
            r.matched_seller_id === sellerId && r.status !== 'accepted'
        );
        if (contacts.length > 0 || sellerPending.length > 0 || sellerProcessed.length > 0) {
            contactCards += '<div class="visit-group-label contact-label">Contacts</div>';
            contactCards += '<div class="visit-cards-grid">';
            // Demandes portail en attente en premier (les plus urgentes)
            sellerPending.forEach(r => { contactCards += renderPendingRequestCard(r); });
            // Contacts manuels
            contacts.sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));
            contacts.forEach(c => { contactCards += renderContactCard(c); });
            // Demandes traitées
            sellerProcessed.forEach(r => { contactCards += renderProcessedRequestCard(r); });
            contactCards += '</div>';
        }

        // Section Visites par statut
        const planned = group.visits.filter(v => v.status === 'planifiee').sort((a, b) => a.visit_date.localeCompare(b.visit_date));
        const done = group.visits.filter(v => v.status === 'effectuee').sort((a, b) => b.visit_date.localeCompare(a.visit_date));
        const cancelled = group.visits.filter(v => v.status === 'annulee').sort((a, b) => b.visit_date.localeCompare(a.visit_date));

        let visitCards = '';
        if (planned.length > 0 || done.length > 0 || cancelled.length > 0) {
            visitCards += '<div class="visit-group-label">Visites</div>';
        }
        const visitDropZone = `<div class="visits-drop-zone" data-seller-id="${sellerId}"
            ondragover="event.preventDefault(); this.classList.add('drag-over')"
            ondragleave="this.classList.remove('drag-over')"
            ondrop="handleContactDrop(event, this)">`;

        if (planned.length > 0) {
            visitCards += '<div class="visit-group-label" style="font-size:10px; color:#9CA3AF; margin-top:4px">À venir</div>';
            visitCards += visitDropZone + '<div class="visit-cards-grid">';
            planned.forEach(v => { visitCards += renderVisitCard(v); });
            visitCards += '</div></div>';
        }
        if (done.length > 0) {
            visitCards += '<div class="visit-group-label" style="font-size:10px; color:#9CA3AF; margin-top:4px">Effectuées</div>';
            visitCards += '<div class="visit-cards-grid">';
            done.forEach(v => { visitCards += renderVisitCard(v); });
            visitCards += '</div>';
        }
        if (cancelled.length > 0) {
            visitCards += '<div class="visit-group-label" style="font-size:10px; color:#9CA3AF; margin-top:4px">Annulées</div>';
            visitCards += '<div class="visit-cards-grid">';
            cancelled.forEach(v => { visitCards += renderVisitCard(v); });
            visitCards += '</div>';
        }
        // Drop zone vide si pas de visites planifiées (pour pouvoir dropper des contacts)
        if (planned.length === 0) {
            visitCards += visitDropZone + '</div>';
        }

        return `<div class="property-accordion${isOpen ? ' open' : ''}" data-seller-id="${sellerId}">
            <div class="property-accordion-header" onclick="toggleAccordion('${sellerId}')">
                ${photoHtml}
                <div class="accordion-property-info">
                    <div class="accordion-address">${escapeHtml(address)}</div>
                    <div class="accordion-seller">${escapeHtml(sellerName)}${propertyInfo ? ' — ' + escapeHtml(propertyInfo) : ''}</div>
                    ${portalStatsHtml}
                </div>
                <div class="accordion-badges">${badges}</div>
                <button class="accordion-add-contact-btn" onclick="event.stopPropagation(); openAddContactModal('${sellerId}')" title="Ajouter un contact">
                    <i class="fa-solid fa-user-plus"></i>
                </button>
                <i class="fa-solid fa-chevron-down accordion-chevron"></i>
            </div>
            <div class="property-accordion-body">
                <div class="accordion-body-inner">${contactCards}${visitCards}</div>
            </div>
        </div>`;
    }

    function renderVisitCard(visit) {
        const dateStr = visit.visit_date
            ? new Date(visit.visit_date).toLocaleDateString('fr-FR', { weekday: 'short', day: '2-digit', month: 'short' })
            : '';
        const timeStr = visit.visit_time ? visit.visit_time.slice(0, 5) : '';
        const visitorName = getVisitorName(visit);
        const visitorPhone = getVisitorPhone(visit);
        const linked = isLinkedBuyer(visit);

        const fb = visit.feedback_rating ? FEEDBACK_LABELS[visit.feedback_rating] : null;
        const pp = visit.price_perception ? PRICE_LABELS[visit.price_perception] : null;
        const dec = visit.buyer_decision && visit.buyer_decision !== 'en_attente'
            ? DECISION_LABELS[visit.buyer_decision] : null;

        // Points feedback
        let pointsHtml = '';

    async function unmarkPortalProcessed(requestId) {
        try {
            const headers = await getAuthHeaders();
            const resp = await fetch('/api/assistant', {
                method: 'POST', headers,
                body: JSON.stringify({
                    action: 'process_visit_request',
                    request_id: requestId,
                    decision: 'reopen'
                })
            });
            if (!resp.ok) {
                // Fallback : update direct en DB
                const userId = await getCurrentUserId();
                await supabaseClient.from('visit_requests')
                    .update({ status: 'pending', updated_at: new Date().toISOString() })
                    .eq('id', requestId)
                    .eq('user_id', userId);
            }
            // Recharger les deux listes
            await Promise.all([loadPortalRequests(), loadProcessedRequests()]);
            applyFrontendMatching();
            renderPortalBanner();
            renderVisitsPage();
            showToast('Demande remise en attente');
        } catch (err) {
            console.error('[Visites] Unmark processed error:', err);
            showToast('Erreur');
        }
    }

    function toggleAccordion(sellerId) {
        const el = document.querySelector(`.property-accordion[data-seller-id="${sellerId}"]`);
        if (!el) return;
        if (el.classList.contains('open')) {
            el.classList.remove('open');
            openAccordions.delete(sellerId);
        } else {
            el.classList.add('open');
            openAccordions.add(sellerId);
        }
    }

    // ===== SYNC GOOGLE CALENDAR =====

    let _calendarConnected = null; // cache

    async function isCalendarConnected() {
        if (_calendarConnected !== null) return _calendarConnected;
        const userId = await getCurrentUserId();
        if (!userId) return false;
        const { data } = await supabaseClient
            .from('user_integrations')
            .select('google_access_token')
            .eq('user_id', userId)
            .maybeSingle();
        _calendarConnected = !!(data && data.google_access_token);
        return _calendarConnected;
    }

    async function proposeCalendarSync(visit, seller) {
        const connected = await isCalendarConnected();
        if (!connected) return;

        const buyerName = visit.buyers ? `${visit.buyers.first_name || ''} ${visit.buyers.last_name || ''}`.trim() : '';
        const visitorName = buyerName || visit.buyer_name || 'Visiteur';
        const visitorPhone = visit.buyers?.phone || visit.visitor_phone || '';
        const visitorEmail = visit.buyers?.email || visit.visitor_email || '';
        const address = seller?.address || '';
        const dateObj = new Date(visit.visit_date + 'T12:00:00');
        const dayLabel = dateObj.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
        const timeLabel = visit.visit_time ? visit.visit_time.slice(0, 5) : '';
        const propertyType = seller?.property_type ? seller.property_type.charAt(0).toUpperCase() + seller.property_type.slice(1) : '';
        const city = seller?.address ? extractCity(seller.address) : (seller?.city || '');
        const title = `Visite${propertyType ? ' ' + propertyType : ''}${city ? ' ' + city : ''} - ${visitorName}`;

        // Normaliser visit_time (peut être HH:MM:SS depuis PG)
        const startTime = visit.visit_time ? visit.visit_time.slice(0, 5) : '';

        // Calculer end_time (1h par défaut)
        let endTime = '18:00';
        if (startTime) {
            const [h, m] = startTime.split(':').map(Number);
            const endH = Math.min(h + 1, 23);
            endTime = `${String(endH).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        }

        const modal = document.createElement('div');
        modal.id = 'calendarSyncModal';
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-card" style="max-width:400px">
                <div style="text-align:center; margin-bottom:16px">
                    <i class="fa-brands fa-google" style="font-size:28px; color:#4285F4"></i>
                    <h3 style="margin:8px 0 4px; font-size:16px; font-weight:700; color:var(--text-dark)">Ajouter à l'agenda ?</h3>
                </div>
                <div style="background:#F0F0FF; border:1.5px solid #c7d2fe; border-radius:12px; padding:12px 14px; margin-bottom:16px">
                    <div style="font-size:14px; font-weight:700; color:#4338ca">${escapeHtml(title)}</div>
                    <div style="font-size:13px; color:#6366f1; margin-top:4px">${escapeHtml(dayLabel)}${timeLabel ? ' à ' + timeLabel : ''}</div>
                    ${address ? `<div style="font-size:12px; color:#64748b; margin-top:4px"><i class="fa-solid fa-location-dot"></i> ${escapeHtml(address)}</div>` : ''}
                </div>
                <div style="display:flex; gap:10px">
                    <button id="calSyncBtn" onclick="confirmCalendarSync('${visit.visit_date}', '${startTime}', '${endTime}', this)" style="
                        flex:1; padding:12px; background:linear-gradient(135deg,#667eea,#764ba2);
                        color:white; border:none; border-radius:12px; font-size:14px; font-weight:700;
                        cursor:pointer; font-family:Inter,sans-serif; display:flex; align-items:center;
                        justify-content:center; gap:8px;
                    "><i class="fa-solid fa-calendar-plus"></i> Ajouter</button>
                    <button onclick="closeModal('calendarSyncModal')" style="
                        padding:12px 20px; background:#F1F5F9; color:#64748b; border:none; border-radius:12px;
                        font-size:14px; font-weight:600; cursor:pointer; font-family:Inter,sans-serif;
                    ">Non merci</button>
                </div>
            </div>`;

        // Description avec infos contact
        const descParts = [];
        descParts.push(`Visiteur : ${visitorName}`);
        if (visitorPhone) descParts.push(`Tél : ${visitorPhone}`);
        if (visitorEmail) descParts.push(`Email : ${visitorEmail}`);
        if (visit.notes) descParts.push(`\nNotes : ${visit.notes.substring(0, 300)}`);
        const description = descParts.join('\n');

        // Stocker les données pour la confirmation
        modal.dataset.title = title;
        modal.dataset.location = address;
        modal.dataset.description = description;
        document.body.appendChild(modal);
    }

    async function confirmCalendarSync(date, startTime, endTime, btn) {
        const modal = document.getElementById('calendarSyncModal');
        const title = modal.dataset.title;
        const location = modal.dataset.location;
        const description = modal.dataset.description || null;

        // Normaliser les heures en HH:MM (pas HH:MM:SS)
        const normalizeTime = t => t ? t.slice(0, 5) : t;

        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Ajout...';

        try {
            const headers = await getAuthHeaders();
            const resp = await fetch('/api/assistant', {
                method: 'POST', headers,
                body: JSON.stringify({
                    action: 'create_event',
                    title,
                    date,
                    start_time: normalizeTime(startTime) || '09:00',
                    end_time: normalizeTime(endTime) || '10:00',
                    location: location || null,
                    description
                })
            });
            if (!resp.ok) throw new Error('Erreur création événement');
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Ajouté !';
            btn.style.background = '#22c55e';
            setTimeout(() => closeModal('calendarSyncModal'), 1200);
        } catch (err) {
            console.error('[Visites:Calendar] Erreur:', err);
            btn.innerHTML = '<i class="fa-solid fa-xmark"></i> Erreur';
            btn.disabled = false;
        }
    }

    async function generateVisitConfirmMsg(visitId) {
        const visit = allVisits.find(v => v.id === visitId);
        if (!visit) return;

        const genBtn = document.getElementById('visitMsgGenBtn');
        const loading = document.getElementById('visitMsgLoading');
        const output = document.getElementById('visitMsgOutput');
        const actions = document.getElementById('visitMsgActions');

        genBtn.style.display = 'none';
        loading.style.display = '';

        const visitorName = visit.buyers
            ? `${visit.buyers.first_name || ''} ${visit.buyers.last_name || ''}`.trim()
            : visit.buyer_name || '';
        const seller = visit.sellers || activeSellers.find(s => s.id === visit.seller_id);
        const address = seller?.address || '';

        const vDate = new Date(visit.visit_date + 'T12:00:00');
        const dateLabel = vDate.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
        const timeLabel = visit.visit_time ? visit.visit_time.slice(0, 5) : '';

        // Récupérer nom agent et réseau
        const { data: { session } } = await supabaseClient.auth.getSession();
        const meta = session?.user?.user_metadata || {};
        const agentName = meta.full_name || meta.name || '';
        const userId = session?.user?.id;
        const { data: profile } = await supabaseClient.from('profiles')
            .select('agency_name').eq('id', userId).maybeSingle();
        const agencyName = profile?.agency_name || 'Efficity';

        // Séparer prénom/nom du visiteur
        const parts = visitorName.trim().split(/\s+/);
        const firstName = parts[0] || '';
        const lastName = parts.length > 1 ? parts.slice(1).join(' ') : '';

        try {
            const headers = await getAuthHeaders();
            const resp = await fetch('/api/generate-message', {
                method: 'POST', headers,
                body: JSON.stringify({
                    channel: visitMsgChannel,
                    scenario: 'confirmation_visite',
                    leadType: 'buyer',
                    leadData: {
                        first_name: firstName,
                        last_name: lastName,
                        phone: visit.buyers?.phone || visit.visitor_phone || '',
                        address
                    },
                    agentName,
                    agencyName,
                    tone: 'vous',
                    customPrompt: `Date du RDV : ${dateLabel}${timeLabel ? ' à ' + timeLabel : ''}. Adresse du bien : ${address || 'non précisée'}.`
                })
            });
            const data = await resp.json();
            output.value = data.message || 'Erreur de génération';
            output.style.display = '';
            actions.style.display = '';
        } catch (err) {
            console.error('[VisitConfirmMsg] Erreur:', err);
            output.value = 'Erreur lors de la génération du message.';
            output.style.display = '';
        } finally {
            loading.style.display = 'none';
            genBtn.style.display = '';
            genBtn.innerHTML = '<i class="fa-solid fa-rotate-right"></i> Régénérer';
        }
    }

    function sendVisitMsg(channel) {
        const modal = document.getElementById('visitConfirmMsgModal');
        const phone = (modal.dataset.phone || '').replace(/\s/g, '');
        const email = modal.dataset.email || '';
        const text = document.getElementById('visitMsgOutput').value;

        if (channel === 'sms') {
            if (!phone) { alert('Pas de numéro de téléphone'); return; }
            window.open(`sms:${phone}?body=${encodeURIComponent(text)}`, '_blank');
        } else if (channel === 'whatsapp') {
            let waPhone = phone;
            if (waPhone.startsWith('0')) waPhone = '33' + waPhone.slice(1);
            if (waPhone) {
                window.open(`https://wa.me/${waPhone}?text=${encodeURIComponent(text)}`, '_blank');
            } else {
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
            }
        } else if (channel === 'email') {
            if (!email) { alert('Pas d\'adresse email'); return; }
            window.open(`mailto:${email}?subject=${encodeURIComponent('Confirmation de visite')}&body=${encodeURIComponent(text)}`, '_blank');
        }
    }

    async function submitContactTraite(contactId) {
        const btn = document.getElementById('contactTraiteSubmitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Traitement...';

        const note = document.getElementById('contactTraiteNote').value.trim();
        const infos = document.getElementById('contactTraiteInfos').value.trim();
        const createBuyer = document.getElementById('contactTraiteCreateBuyer').checked;
        const contact = allVisits.find(v => v.id === contactId);

        const userId = await getCurrentUserId();
        if (!userId) return;

        // Mettre à jour le contact comme traité
        const updateData = { contact_treated: true, updated_at: new Date().toISOString() };
        // Construire les notes enrichies
        const noteParts = [];
        if (note) noteParts.push('[Traité] ' + note);
        if (infos) noteParts.push('[Infos] ' + infos);
        if (noteParts.length > 0) {
            const existingNotes = contact?.notes || '';
            updateData.notes = existingNotes
                ? existingNotes + '\n' + noteParts.join('\n')
                : noteParts.join('\n');
        }

        const { error } = await supabaseClient.from('visits')
            .update(updateData)
            .eq('id', contactId).eq('user_id', userId);

        if (error) {
            console.error('[Visites] Mark traite error:', error);
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Valider';
            return;
        }

        if (contact) {
            contact.contact_treated = true;
            if (updateData.notes) contact.notes = updateData.notes;
        }

        // Créer acquéreur si demandé
        if (createBuyer && contact && !contact.buyer_id) {
            closeModal('contactTraiteModal');
            openPromoteModal(contactId);
            showToast('Contact marqué comme traité');
            renderVisitsPage();
            return;
        }

        closeModal('contactTraiteModal');
        renderVisitsPage();
        showToast('Contact marqué comme traité');
    }

    let contactImageBase64 = null;
    let contactImageType = null;

    // Paste listener global pour le modal contact
    document.addEventListener('paste', async (e) => {
        const modal = document.getElementById('addContactModal');
        if (!modal) return;
        const items = e.clipboardData?.items;
        if (!items) return;
        for (const item of items) {
            if (item.type.startsWith('image/')) {
                e.preventDefault();
                const blob = item.getAsFile();
                if (blob) await processContactImage(blob);
                return;
            }
        }
    });

    async function processContactImage(file) {
        try {
            const compressed = await compressImage(file, 1600, 0.8);
            const base64 = await fileToBase64Contact(compressed);
            contactImageBase64 = base64;
            contactImageType = 'image/jpeg';

            document.getElementById('contactImportPasteArea').style.display = 'none';
            document.getElementById('contactImportPreview').style.display = '';
            document.getElementById('contactImportPreviewImg').src = 'data:image/jpeg;base64,' + base64;
            document.getElementById('contactImportInfo').textContent = `Image — ${(compressed.size / 1024).toFixed(0)} Ko`;
            document.getElementById('contactImportAnalyzeBtn').style.display = '';
            document.getElementById('contactImportAnalyzeBtn').disabled = false;
        } catch (err) {
            console.error('[ContactImport] Erreur compression:', err);
            alert('Erreur lors du traitement de l\'image.');
        }
    }

    function fileToBase64Contact(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    function clearContactImage() {
        contactImageBase64 = null;
        contactImageType = null;
        document.getElementById('contactImportPreview').style.display = 'none';
        document.getElementById('contactImportPasteArea').style.display = '';
        document.getElementById('contactImportAnalyzeBtn').style.display = 'none';
        document.getElementById('contactImportResult').style.display = 'none';
    }

    async function analyzeContactImage() {
        if (!contactImageBase64) return;

        document.getElementById('contactImportAnalyzeBtn').style.display = 'none';
        document.getElementById('contactImportLoading').style.display = '';

        try {
            const headers = await getAuthHeaders();
            const resp = await fetch('/api/analyze-document', {
                method: 'POST', headers,
                body: JSON.stringify({
                    mode: 'screenshot_import',
                    leadType: 'buyer',
                    image: contactImageBase64,
                    imageType: contactImageType
                })
            });

            if (!resp.ok) throw new Error('Erreur analyse');
            const data = await resp.json();
            const f = data.fields || {};

            // Pré-remplir le formulaire
            const fullName = [f.first_name, f.last_name].filter(Boolean).join(' ');
            if (fullName) document.getElementById('contactName').value = fullName;
            if (f.phone) document.getElementById('contactPhone').value = f.phone;
            if (f.email) document.getElementById('contactEmail').value = f.email;
            if (f.notes) document.getElementById('contactNotes').value = f.notes;

            // Source depuis la plateforme détectée
            if (f.source_platform) {
                const platformMap = {
                    'seloger': 'seloger', 'myselogerpro': 'seloger', 'logic-immo': 'seloger',
                    'leboncoin': 'leboncoin', 'bienici': 'bienici', 'jinka': 'jinka',
                    'pap': 'pap', 'efficity': 'efficity', 'figaro': 'figaro',
                    'meilleursagents': 'autre'
                };
                const mapped = platformMap[f.source_platform] || 'autre';
                document.getElementById('contactSource').value = mapped;
            }

            // Feedback visuel
            const extracted = [fullName, f.phone, f.email].filter(Boolean);
            const resultEl = document.getElementById('contactImportResult');
            resultEl.style.display = '';
            if (extracted.length > 0) {
                resultEl.innerHTML = `<div style="padding:8px 12px; background:#E8F5E9; border-radius:8px; font-size:12px; color:#2E7D32; margin-top:8px">
                    <i class="fa-solid fa-check"></i> Extrait : ${extracted.map(e => escapeHtml(e)).join(' • ')}
                    ${f.source_platform ? `<span style="margin-left:4px; opacity:0.7">(${escapeHtml(f.source_platform)})</span>` : ''}
                </div>`;
            } else {
                resultEl.innerHTML = `<div style="padding:8px 12px; background:#FFF3E0; border-radius:8px; font-size:12px; color:#E65100; margin-top:8px">
                    <i class="fa-solid fa-triangle-exclamation"></i> Aucune info détectée — remplissez manuellement
                </div>`;
            }
        } catch (err) {
            console.error('[ContactImport] Erreur analyse:', err);
            document.getElementById('contactImportResult').style.display = '';
            document.getElementById('contactImportResult').innerHTML = `<div style="padding:8px 12px; background:#FFEBEE; border-radius:8px; font-size:12px; color:#C62828; margin-top:8px">
                <i class="fa-solid fa-xmark"></i> Erreur lors de l'extraction
            </div>`;
        } finally {
            document.getElementById('contactImportLoading').style.display = 'none';
        }
    }

        const contact = {

    async function submitPlanFromContact() {
        const contactId = document.getElementById('planContactId').value;
        const date = document.getElementById('planContactDate').value;
        const time = document.getElementById('planContactTime').value || null;

        if (!date) { alert('Date requise'); return; }

        const userId = await getCurrentUserId();
        if (!userId) return;

        const { error } = await supabaseClient.from('visits')
            .update({
                status: 'planifiee',
                visit_date: date,
                visit_time: time,
                updated_at: new Date().toISOString()
            })
            .eq('id', contactId)
            .eq('user_id', userId);

        if (error) {
            console.error('[Visites] Plan from contact error:', error);
            alert('Erreur : ' + error.message);
            return;
        }

        // Mettre à jour le state local
        const contact = allVisits.find(v => v.id === contactId);
        if (contact) {
            contact.status = 'planifiee';
            contact.visit_date = date;
            contact.visit_time = time;
        }

        document.getElementById('planFromContactModal').remove();
        renderVisitsPage();
        showToast('Visite planifiée');

        // Proposer l'ajout au calendrier
        if (contact && date) {
            const seller = activeSellers.find(s => s.id === contact.seller_id);
            proposeCalendarSync({ visit_date: date, visit_time: time, buyer_name: contact.buyer_name }, seller);
        }
    }

    function setupSellerAutocomplete() {
        const input = document.getElementById('modalSellerSearch');
        const dropdown = document.getElementById('modalSellerDropdown');
        if (!input || !dropdown) return;

        let timer = null;
        input.addEventListener('input', function() {
            clearTimeout(timer);
            const q = this.value.trim().toLowerCase();
            document.getElementById('modalSelectedSellerId').value = '';
            if (q.length < 2) { dropdown.classList.remove('active'); return; }

            timer = setTimeout(() => {
                const results = activeSellers.filter(s => {
                    const name = ((s.first_name || '') + ' ' + (s.last_name || '')).toLowerCase();
                    const addr = (s.address || '').toLowerCase();
                    return name.includes(q) || addr.includes(q);
                }).slice(0, 8);

                if (results.length === 0) { dropdown.classList.remove('active'); return; }

                dropdown.innerHTML = results.map(s => {
                    const name = [(s.first_name || ''), (s.last_name || '')].filter(Boolean).join(' ');
                    const addr = s.address || '';
                    const city = extractCity(addr) || addr;
                    return `<div class="ac-option" data-id="${s.id}">
                        <div class="ac-option-name">${escapeHtml(name)}</div>
                        <div class="ac-option-addr">${escapeHtml(city)}</div>
                    </div>`;
                }).join('');
                dropdown.classList.add('active');

                dropdown.querySelectorAll('.ac-option').forEach(opt => {
                    opt.addEventListener('click', function() {
                        const sid = this.dataset.id;
                        const s = activeSellers.find(x => x.id === sid);
                        if (s) {
                            input.value = [(s.first_name || ''), (s.last_name || '')].filter(Boolean).join(' ')
                                + (s.address ? ' — ' + s.address : '');
                            document.getElementById('modalSelectedSellerId').value = sid;
                        }
                        dropdown.classList.remove('active');
                    });
                });
            }, 200);
        });

        document.addEventListener('click', function(e) {
            if (!input.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.remove('active');
        });
    }

    function setupBuyerAutocomplete() {
        const input = document.getElementById('modalBuyerSearch');
        const dropdown = document.getElementById('modalBuyerDropdown');

        let timer = null;
        input.addEventListener('input', function() {
            clearTimeout(timer);

            if (q.length < 2) { dropdown.classList.remove('active'); return; }

                const userId = await getCurrentUserId();

                    .from('buyers')
                    .select('id, first_name, last_name, phone, email')

    // ===== MODAL: FEEDBACK =====

    /**
     * openFeedbackForm — Wizard étape par étape pour le retour de visite.
     * Chaque question apparaît individuellement avec possibilité de passer.
     * Les réponses sont collectées dans un objet avant sauvegarde finale.
     */
    function openFeedbackForm(visitId) {
        closeModal('feedbackModal');
        const visit = allVisits.find(v => v.id === visitId);
        if (!visit) return;

        // Réponses existantes (édition) ou vides
        const answers = {
            feedback_rating: visit.feedback_rating || null,
            positive_points: visit.positive_points || [],
            negative_points: visit.negative_points || [],
            price_perception: visit.price_perception || null,
            neighborhood_feel: visit.neighborhood_feel || null,
            buyer_decision: visit.buyer_decision || null,
            notes: visit.notes || ''
        };

        // Définition des étapes du wizard
        const STEPS = [
            {
                key: 'feedback_rating', question: 'Quel est le ressenti global ?', type: 'single',
                options: [
                    { value: 'coup_de_coeur', label: '😍 Coup de coeur' },
                    { value: 'interessant', label: '😊 Intéressant' },
                    { value: 'pas_convaincu', label: '😕 Pas convaincu' },
                    { value: 'pas_du_tout', label: '😞 Pas du tout' }
                ]
            },
            {
                key: 'positive_points', question: 'Des points positifs ?', type: 'multi',
                options: POSITIVE_POINTS.map(p => ({ value: p.value, label: p.label }))
            },
            {
                key: 'negative_points', question: 'Des points négatifs ?', type: 'multi',
                options: NEGATIVE_POINTS.map(p => ({ value: p.value, label: p.label }))
            },
            {
                key: 'price_perception', question: 'Perception du prix ?', type: 'single',
                options: [
                    { value: 'adapte', label: '✅ Adapté' },
                    { value: 'un_peu_eleve', label: '⚠️ Un peu élevé' },
                    { value: 'trop_eleve', label: '🚫 Trop élevé' }
                ]
            },
            {
                key: 'neighborhood_feel', question: 'Le quartier ?', type: 'single',
                options: [
                    { value: 'connait_bien', label: '🏘️ Connaît bien' },
                    { value: 'decouvre', label: '🗺️ Découvre' },
                    { value: 'pas_convaincu', label: '😕 Pas convaincu' }
                ]
            },
            {
                key: 'buyer_decision', question: 'Décision du visiteur ?', type: 'single',
                options: [
                    { value: 'en_attente', label: '⏳ En attente' },
                    { value: 'interesse', label: '👍 Intéressé' },
                    { value: 'contre_visite', label: '🔄 Contre-visite' },
                    { value: 'offre', label: '🎉 Offre' },
                    { value: 'refus', label: '👎 Refus' }
                ]
            },
            { key: 'notes', question: 'Une note à ajouter ?', type: 'textarea' }
        ];

        const TOTAL_STEPS = STEPS.length;
        let currentStep = 0;

        // Créer le conteneur modal
        const modal = document.createElement('div');
        modal.id = 'feedbackModal';
        modal.className = 'modal-overlay';
        document.body.appendChild(modal);

        function renderStep() {
            const step = STEPS[currentStep];
            const isLast = currentStep === TOTAL_STEPS - 1;

            // Barre de progression
            const progressHtml = STEPS.map((_, i) => {
                const cls = i < currentStep ? 'done' : (i === currentStep ? 'current' : '');
                return `<div class="feedback-progress-dot ${cls}"></div>`;
            }).join('');

            // Contenu selon le type d'étape
            let contentHtml = '';
            if (step.type === 'single') {
                const selected = answers[step.key];
                contentHtml = `<div class="feedback-chips">
                    ${step.options.map(o =>
                        `<span class="feedback-chip${selected === o.value ? ' active' : ''}" data-value="${o.value}">${o.label}</span>`
                    ).join('')}
                </div>`;
            } else if (step.type === 'multi') {
                const selectedArr = answers[step.key] || [];
                contentHtml = `<div class="feedback-chips">
                    ${step.options.map(o =>
                        `<span class="feedback-chip${selectedArr.includes(o.value) ? ' active' : ''}" data-value="${o.value}">${o.label}</span>`
                    ).join('')}
                </div>`;
            } else if (step.type === 'textarea') {
                contentHtml = `<textarea class="feedback-notes" id="fbWizardNotes" rows="3" placeholder="Observations...">${escapeHtml(answers.notes)}</textarea>`;
            }

            // Bouton suivant pour multi-select et textarea
            let nextBtnHtml = '';
            if (step.type === 'multi' || step.type === 'textarea') {
                const btnLabel = isLast ? 'Enregistrer' : 'Suivant';
                nextBtnHtml = `<button class="feedback-save-btn" id="fbWizardNext">${btnLabel}</button>`;
            }

            modal.innerHTML = `
                <div class="feedback-wizard">
                    <button class="feedback-close-btn" id="fbWizardClose">&times;</button>
                    <div class="feedback-progress">${progressHtml}</div>
                    <div class="feedback-step">
                        <div class="feedback-question">${step.question}</div>
                        ${contentHtml}
                        ${nextBtnHtml}
                        <div class="feedback-nav">
                            <button class="feedback-skip-link" id="fbWizardSkip">${isLast ? 'Passer et enregistrer' : 'Passer'}</button>
                        </div>
                    </div>
                </div>
            `;

            // Fermer
            modal.querySelector('#fbWizardClose').addEventListener('click', () => closeModal('feedbackModal'));
            modal.addEventListener('click', (e) => { if (e.target === modal) closeModal('feedbackModal'); });

            // Passer
            modal.querySelector('#fbWizardSkip').addEventListener('click', () => {
                if (isLast) {
                    if (step.type === 'textarea') {
                        const ta = document.getElementById('fbWizardNotes');
                        if (ta) answers.notes = ta.value.trim();
                    }
                    saveFeedbackWizard(visitId, answers);
                } else {
                    currentStep++;
                    renderStep();
                }
            });

            // Chips : single-select avance automatiquement, multi-select toggle
            if (step.type === 'single') {
                modal.querySelectorAll('.feedback-chip').forEach(chip => {
                    chip.addEventListener('click', function() {
                        modal.querySelectorAll('.feedback-chip').forEach(c => c.classList.remove('active'));
                        this.classList.add('active');
                        answers[step.key] = this.dataset.value;
                        // Avance auto après un court délai visuel
                        setTimeout(() => {
                            if (isLast) {
                                saveFeedbackWizard(visitId, answers);
                            } else {
                                currentStep++;
                                renderStep();
                            }
                        }, 200);
                    });
                });
            } else if (step.type === 'multi') {
                modal.querySelectorAll('.feedback-chip').forEach(chip => {
                    chip.addEventListener('click', function() {
                        this.classList.toggle('active');
                        const val = this.dataset.value;
                        const arr = answers[step.key];
                        if (arr.includes(val)) {
                            answers[step.key] = arr.filter(v => v !== val);
                        } else {
                            arr.push(val);
                        }
                    });
                });
                // Bouton Suivant pour multi
                modal.querySelector('#fbWizardNext').addEventListener('click', () => {
                    if (isLast) {
                        saveFeedbackWizard(visitId, answers);
                    } else {
                        currentStep++;
                        renderStep();
                    }
                });
            } else if (step.type === 'textarea') {
                modal.querySelector('#fbWizardNext').addEventListener('click', () => {
                    const ta = document.getElementById('fbWizardNotes');
                    if (ta) answers.notes = ta.value.trim();
                    saveFeedbackWizard(visitId, answers);
                });
            }
        }

        renderStep();
    }

    async function saveFeedbackWizard(visitId, answers) {
        const updates = {
            feedback_rating: answers.feedback_rating,
            price_perception: answers.price_perception,
            buyer_decision: answers.buyer_decision,
            positive_points: answers.positive_points.length > 0 ? answers.positive_points : null,
            negative_points: answers.negative_points.length > 0 ? answers.negative_points : null,
            neighborhood_feel: answers.neighborhood_feel,
            notes: answers.notes || null,
            updated_at: new Date().toISOString()
        };

        const userId = await getCurrentUserId();
        const { error } = await supabaseClient.from('visits')
            .update(updates).eq('id', visitId).eq('user_id', userId);

        if (error) { console.error('[Visites] Feedback error:', error); alert('Erreur'); return; }

        const visit = allVisits.find(v => v.id === visitId);
        if (visit) Object.assign(visit, updates);

        if (typeof awardPoints === 'function') {
            awardPoints('visit_feedback', { visit_id: visitId });
        }

        closeModal('feedbackModal');
        renderVisitsPage();
        showToast('Retour enregistré');
    }

    function openPromoteModal(visitId) {

        const parts = name.trim().split(/\s+/);
        const firstName = parts.length > 1 ? parts.slice(0, -1).join(' ') : parts[0] || '';

    async function confirmPromote(visitId) {
        const firstName = document.getElementById('promoteFirstName').value.trim();
        const lastName = document.getElementById('promoteLastName').value.trim();
        const phone = document.getElementById('promotePhone').value.trim();
        const email = document.getElementById('promoteEmail').value.trim();

        if (!firstName) { alert('Le prénom est requis.'); return; }

        const userId = await getCurrentUserId();
        if (!userId) return;

        // Créer le buyer
        const buyer = {
            user_id: userId,
            first_name: firstName,
            last_name: lastName,
            phone: phone || null,
            email: email || null,
            status: 'nouveau',
            source: 'autre',
            notes: `Promu depuis visite du ${new Date().toLocaleDateString('fr-FR')}`
        };

        const { data, error } = await supabaseClient.from('buyers').insert([buyer]).select();
        if (error) {
            console.error('[Visites] Promote error:', error);
            alert('Erreur : ' + error.message);
            return;
        }

        const newBuyerId = data[0].id;
        const visit = allVisits.find(v => v.id === visitId);

        // Lier cette visite au buyer créé
        await supabaseClient.from('visits')
            .update({ buyer_id: newBuyerId, updated_at: new Date().toISOString() })
            .eq('id', visitId).eq('user_id', userId);

        // Lier toutes les visites du même visiteur libre (même nom + même téléphone)
        if (visit && visit.buyer_name && visit.visitor_phone) {
            await supabaseClient.from('visits')
                .update({ buyer_id: newBuyerId })
                .eq('buyer_name', visit.buyer_name)
                .eq('visitor_phone', visit.visitor_phone)
                .eq('user_id', userId)
                .is('buyer_id', null);
        }

        // Copier les notes du contact/visite vers la fiche acquéreur
        if (visit && visit.notes && visit.notes.trim()) {
            const seller = visit.sellers || activeSellers.find(s => s.id === visit.seller_id);
            const sellerLabel = seller ? (seller.address || `${seller.first_name || ''} ${seller.last_name || ''}`.trim()) : '';
            const noteContent = sellerLabel
                ? `📋 Import visite — ${sellerLabel}\n${visit.notes}`
                : `📋 Import visite\n${visit.notes}`;
            await supabaseClient.from('lead_notes').insert([{
                lead_id: newBuyerId,
                lead_type: 'buyer',
                user_id: userId,
                content: noteContent
            }]);
        }

        closeModal('promoteModal');
        allVisits = await loadAllVisits();
        renderVisitsPage();
        showToast('Acquéreur créé et lié');
    }

                if (!phone) { showToast('Pas de numéro de téléphone'); return; }
                let waPhone = phone;
                if (waPhone.startsWith('0')) waPhone = '33' + waPhone.slice(1);
                window.open(`https://wa.me/${waPhone}?text=${encodeURIComponent(message)}`, '_blank');
            } else if (popupChannel === 'email') {
                if (!visitorEmail) { showToast("Pas d'adresse email"); return; }
                let subject = '', body = message;
                const subjectMatch = message.match(/^Objet\s*:\s*(.+)\n/i);
                if (subjectMatch) { subject = subjectMatch[1].trim(); body = message.slice(subjectMatch[0].length).trim(); }
                window.open(`mailto:${visitorEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`, '_blank');

            const loading = overlay.querySelector('#visitRetourLoading');
            const output = overlay.querySelector('#visitRetourOutput');
            const actionsDiv = overlay.querySelector('#visitRetourActions');

            loading.classList.add('visible');

            const agentName = document.querySelector('#userProfile .user-name')?.textContent?.trim() || '';
            const agencyName = await getAgencyName();

            const customPrompt = `La visite portait sur ${propertyLabel}.${visitDateStr ? ' Elle a eu lieu le ' + visitDateStr + '.' : ''} Mentionne le bien visité (ville) dans le message de manière naturelle.`;

            try {
                const resp = await fetch('/api/generate-message', {
                    method: 'POST',
                    headers: await getAuthHeaders(),
                    body: JSON.stringify({
                        channel: popupChannel,
                        scenario: 'retour_visite',
                        leadData,
                        notes: [],
                        customPrompt,
                        leadType: 'buyer',
                        agentName,
                        agencyName,
                        tone
                    })
                });
                const data = await resp.json().catch(() => ({}));
                if (!resp.ok) throw new Error(data.detail || data.error || 'Erreur');

                output.value = data.message;
                output.style.display = 'block';
                actionsDiv.classList.add('visible');
                openChannelApp(data.message);
            } catch (err) {
                alert('Erreur de génération : ' + err.message);
            } finally {
                genBtn.disabled = false;
                loading.classList.remove('visible');
            }
        };

        overlay.querySelector('#visitRetourGenBtn').addEventListener('click', doGenerate);

        // Actions post-génération
        overlay.querySelector('#vrCopy').addEventListener('click', () => {
            const text = overlay.querySelector('#visitRetourOutput').value;
            if (text) navigator.clipboard.writeText(text).then(() => showToast('Message copié !'));
        });
        overlay.querySelector('#vrSMS').addEventListener('click', () => {
            const saved = popupChannel; popupChannel = 'sms';
            openChannelApp(overlay.querySelector('#visitRetourOutput').value);
            popupChannel = saved;
        });
        overlay.querySelector('#vrWhatsApp').addEventListener('click', () => {
            const saved = popupChannel; popupChannel = 'whatsapp';
            openChannelApp(overlay.querySelector('#visitRetourOutput').value);
            popupChannel = saved;
        });
        overlay.querySelector('#vrEmail').addEventListener('click', () => {
            const saved = popupChannel; popupChannel = 'email';
            openChannelApp(overlay.querySelector('#visitRetourOutput').value);
            popupChannel = saved;
        });
        overlay.querySelector('#vrRegen').addEventListener('click', doGenerate);
    }

    // Re-matching frontend pour les demandes sans match
    /** Extrait les références d'annonce depuis les URLs d'un seller */
    function extractRefsFromLinks(seller) {
        const refs = new Set();
        const links = seller.links || [];
        for (const url of links) {
            if (typeof url !== 'string') continue;
            // Efficity : /achat-immobilier/..._REFERENCE/  (dernière partie numérique de l'URL)
            const efficityMatch = url.match(/efficity\.com\/.*?_(\d{6,})\/?/);
            if (efficityMatch) refs.add(efficityMatch[1]);
            // SeLoger : /annonces/.../REFERENCE.htm ou ?ci=REFERENCE
            const selogerMatch = url.match(/seloger\.com\/.*?(\d{6,})/);
            if (selogerMatch) refs.add(selogerMatch[1]);
            // LeBonCoin : /ad/.../REFERENCE.htm
            const lbcMatch = url.match(/leboncoin\.fr\/.*?(\d{8,})/);
            if (lbcMatch) refs.add(lbcMatch[1]);
            // BienIci : /annonce/.../ ou id dans l'URL
            const bieniciMatch = url.match(/bienici\.com\/.*?(\d{6,})/);
            if (bieniciMatch) refs.add(bieniciMatch[1]);
            // Générique : extraire tout nombre de 6+ chiffres dans l'URL
            const genericNums = url.match(/\/(\d{6,})(?:[\/\?.]|$)/g);
            if (genericNums) genericNums.forEach(m => refs.add(m.replace(/[\/\?.]/g, '')));
        }
        // Aussi chercher dans les titres des link_previews
        const previews = seller.link_previews || {};
        for (const [url, preview] of Object.entries(previews)) {
            if (preview?.title) {
                const titleRefs = preview.title.match(/\b(\d{6,})\b/g);
                if (titleRefs) titleRefs.forEach(r => refs.add(r));
            }
        }
        return refs;
    }

    function frontendMatchSeller(req) {
        if (req.matched_seller_id && req.sellers) return; // Déjà matché

        // Seuls les biens sous mandat/commercialisation sont sur les portails
        const MATCHABLE_STATUSES = new Set(['mandate', 'commercialisation']);
        const matchableSellers = activeSellers.filter(s => MATCHABLE_STATUSES.has(s.status));
        if (matchableSellers.length === 0) return;

        // Récupérer le prix de la demande
        let reqPrice = req.property_price ? parseInt(req.property_price, 10) : null;
        if (!reqPrice) {
            const priceMatch = (req.visitor_message || '').match(/(\d[\d\s]*)\s*€/);
            reqPrice = priceMatch ? parseInt(priceMatch[1].replace(/\s/g, ''), 10) : null;
        }

        // 0. Matching par référence d'annonce (priorité maximale)
        const reqRef = req.property_reference ? req.property_reference.replace(/\D/g, '') : '';
        // Aussi chercher une référence dans le message ou l'adresse
        const reqRefFromMessage = !reqRef && req.visitor_message
            ? (req.visitor_message.match(/[Rr][ée]f(?:[ée]rence)?[\s.:]*(\d{5,})/)?.[1] || '')
            : '';
        const refToMatch = reqRef || reqRefFromMessage;

        if (refToMatch && refToMatch.length >= 5) {
            for (const seller of matchableSellers) {
                const sellerRefs = extractRefsFromLinks(seller);
                if (sellerRefs.has(refToMatch)) {
                    req.matched_seller_id = seller.id;
                    req.sellers = seller;
                    req.match_confidence = 'high';
                    console.log(`[Match] Référence ${refToMatch} → ${seller.address || seller.id}`);
                    return;
                }
            }
        }

        // 1. Matching par adresse
        if (req.property_address) {
            const searchWords = normalizeAddressFront(req.property_address);
            if (searchWords.length > 0) {
                // Calculer les scores pour tous les biens
                const scored = matchableSellers
                    .filter(s => s.address)
                    .map(seller => {
                        const sellerWords = normalizeAddressFront(seller.address);
                        const common = searchWords.filter(w => sellerWords.includes(w));
                        const scoreFromSearch = common.length / Math.max(searchWords.length, 1);
                        const scoreFromSeller = common.length / Math.max(sellerWords.length, 1);
                        return { seller, score: Math.max(scoreFromSearch, scoreFromSeller) };
                    })
                    .filter(s => s.score >= 0.3)
                    .sort((a, b) => b.score - a.score);

                if (scored.length === 1) {
                    req.matched_seller_id = scored[0].seller.id;
                    req.sellers = scored[0].seller;
                    req.match_confidence = scored[0].score >= 0.6 ? 'high' : 'medium';
                    return;
                }

                // Plusieurs biens avec le même score d'adresse → départager par prix
                if (scored.length > 1 && reqPrice) {
                    const topScore = scored[0].score;
                    const tied = scored.filter(s => Math.abs(s.score - topScore) < 0.05);
                    if (tied.length > 1) {
                        tied.sort((a, b) => Math.abs((a.seller.budget || 0) - reqPrice) - Math.abs((b.seller.budget || 0) - reqPrice));
                    }
                    req.matched_seller_id = tied[0].seller.id;
                    req.sellers = tied[0].seller;
                    req.match_confidence = topScore >= 0.6 ? 'high' : 'medium';
                    return;
                }

                // Plusieurs biens, pas de prix → prendre le meilleur score si nettement supérieur
                if (scored.length > 1 && scored[0].score > scored[1].score + 0.15) {
                    req.matched_seller_id = scored[0].seller.id;
                    req.sellers = scored[0].seller;
                    req.match_confidence = scored[0].score >= 0.6 ? 'high' : 'medium';
                    return;
                }
            }
        }

        // 2. Matching par ville/CP + prix (quand l'adresse du portail est juste "VILLE, CP")
        if (req.property_address && reqPrice) {
            const norm = s => (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9\s]/g, ' ');
            const reqAddr = norm(req.property_address);
            // Extraire code postal de la demande
            const cpMatch = reqAddr.match(/\b(69\d{3}|01\d{3}|38\d{3}|42\d{3})\b/);
            const reqCP = cpMatch ? cpMatch[1] : '';
            // Extraire mots de ville (hors CP et chiffres de rue)
            const reqCityWords = reqAddr.replace(/\d+/g, ' ').split(/\s+/).filter(w => w.length > 2);

            if (reqCP || reqCityWords.length > 0) {
                const cityMatches = matchableSellers.filter(s => {
                    if (!s.address) return false;
                    const sellerAddr = norm(s.address);
                    const cpOk = reqCP && sellerAddr.includes(reqCP);
                    const cityOk = reqCityWords.length > 0 && reqCityWords.some(w => sellerAddr.includes(w));
                    const priceOk = s.budget && Math.abs(s.budget - reqPrice) <= reqPrice * 0.15;
                    return (cpOk || cityOk) && priceOk;
                });

                if (cityMatches.length === 1) {
                    req.matched_seller_id = cityMatches[0].id;
                    req.sellers = cityMatches[0];
                    req.match_confidence = 'medium';
                    return;
                }
                if (cityMatches.length > 1) {
                    // Départager par proximité de prix
                    cityMatches.sort((a, b) => Math.abs((a.budget || 0) - reqPrice) - Math.abs((b.budget || 0) - reqPrice));
                    req.matched_seller_id = cityMatches[0].id;
                    req.sellers = cityMatches[0];
                    req.match_confidence = 'medium';
                    return;
                }
            }
        }

        // 3. Fallback : type + prix (pour LeBonCoin etc. qui n'envoient pas l'adresse)
        if (req.property_type) {
            const reqType = (req.property_type || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

            let candidates = matchableSellers.filter(s => {
                if (!s.property_type) return false;
                const sellerType = s.property_type.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                return sellerType.includes(reqType) || reqType.includes(sellerType);
            });

            // Filtrer par proximité prix ±15%
            if (reqPrice) {
                const priceFiltered = candidates.filter(s => {
                    if (!s.budget) return false;
                    return Math.abs(s.budget - reqPrice) <= reqPrice * 0.15;
                });
                if (priceFiltered.length > 0) candidates = priceFiltered;
            }

            // Avec prix : prendre le plus proche
            if (reqPrice && candidates.length >= 1) {
                candidates.sort((a, b) => Math.abs((a.budget || 0) - reqPrice) - Math.abs((b.budget || 0) - reqPrice));
                req.matched_seller_id = candidates[0].id;
                req.sellers = candidates[0];
                req.match_confidence = candidates.length === 1 ? 'medium' : 'low';
                return;
            }

            // Sans prix : matcher seulement s'il n'y a qu'UN SEUL bien de ce type
            if (!reqPrice && candidates.length === 1) {
                req.matched_seller_id = candidates[0].id;
                req.sellers = candidates[0];
                req.match_confidence = 'low';
            }
        }
    }

    function normalizeAddressFront(address) {
        const stopWords = new Set(['de', 'du', 'des', 'la', 'le', 'les', 'l', 'et', 'a', 'en', 'rue', 'avenue', 'boulevard', 'place', 'allee', 'chemin', 'impasse', 'cours', 'passage', 'route', 'voie']);
        return address
            .toLowerCase()
            .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
            .replace(/[^a-z0-9\s]/g, ' ')
            .split(/\s+/)
            .filter(w => (w.length > 1 || /^\d+$/.test(w)) && !stopWords.has(w));
    }

    function applyFrontendMatching() {

    async function loadVisitRequestStats() {
        const userId = await getCurrentUserId();
        if (!userId) return;

        const { data, error } = await supabaseClient
            .from('visit_requests')
            .select('matched_seller_id, status')
            .eq('user_id', userId);

        if (error) {
            console.error('[Visites] VR stats error:', error);
            return;
        }

        visitRequestStats = {};
        (data || []).forEach(vr => {
            const sid = vr.matched_seller_id;
            if (!sid) return;
            if (!visitRequestStats[sid]) visitRequestStats[sid] = { contacts: 0, processed: 0 };
            visitRequestStats[sid].contacts++;
            if (vr.status !== 'pending') visitRequestStats[sid].processed++;
        });
    }

    function setupPortalSellerAutocomplete(inputId, dropdownId, hiddenId) {
        const input = document.getElementById(inputId);
        const dropdown = document.getElementById(dropdownId);
        if (!input || !dropdown) return;

        let timer = null;
        input.addEventListener('input', function() {
            clearTimeout(timer);
            const q = this.value.trim().toLowerCase();
            document.getElementById(hiddenId).value = '';
            if (q.length < 2) { dropdown.classList.remove('active'); return; }

            timer = setTimeout(() => {
                const results = activeSellers.filter(s => {
                    const name = ((s.first_name || '') + ' ' + (s.last_name || '')).toLowerCase();
                    const addr = (s.address || '').toLowerCase();
                    return name.includes(q) || addr.includes(q);
                }).slice(0, 8);

                if (results.length === 0) { dropdown.classList.remove('active'); return; }

                dropdown.innerHTML = results.map(s => {
                    const name = [(s.first_name || ''), (s.last_name || '')].filter(Boolean).join(' ');
                    const addr = s.address || '';
                    return `<div class="ac-option" data-id="${s.id}">
                        <div class="ac-option-name">${escapeHtml(name)}</div>
                        <div class="ac-option-addr">${escapeHtml(addr)}</div>
                    </div>`;
                }).join('');
                dropdown.classList.add('active');

                dropdown.querySelectorAll('.ac-option').forEach(opt => {
                    opt.addEventListener('click', function() {
                        const sid = this.dataset.id;
                        const s = activeSellers.find(x => x.id === sid);
                        if (s) {
                            input.value = [(s.first_name || ''), (s.last_name || '')].filter(Boolean).join(' ')
                                + (s.address ? ' — ' + s.address : '');
                            document.getElementById(hiddenId).value = sid;
                        }
                        dropdown.classList.remove('active');
                    });
                });
            }, 200);
        });

        document.addEventListener('click', function(e) {
            if (!input.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.remove('active');
        });
    }

    async function submitPortalPlan(requestId) {
        const sellerId = document.getElementById('ppSelectedSellerId').value;
        if (!sellerId) {
            alert('Veuillez sélectionner un bien.');
            return;
        }
        const visitDate = document.getElementById('ppVisitDate').value;
        if (!visitDate) {
            alert('Veuillez renseigner une date.');
            return;
        }

        const btn = document.getElementById('ppSubmitBtn');
        btn.disabled = true;
        btn.textContent = 'Planification...';

        const headers = {};
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) headers['Authorization'] = 'Bearer ' + session.access_token;

        try {
            const resp = await fetch('/api/assistant', {
                method: 'POST',
                headers: { ...headers, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'process_visit_request',
                    request_id: requestId,
                    decision: 'accept',
                    seller_id: sellerId,
                    visit_date: visitDate,
                    visit_time: document.getElementById('ppVisitTime').value || null,
                    note: document.getElementById('ppVisitNote').value.trim() || null,
                    create_buyer: document.getElementById('ppCreateBuyer').checked
                })
            });

            if (resp.ok) {
                const data = await resp.json();
                closeModal('portalPlanModal');
                showToast(data.buyer_id ? 'Visite planifiée + lead créé !' : 'Visite planifiée !');
                portalRequests = portalRequests.filter(r => r.id !== requestId);
                renderPortalBanner();
                allVisits = await loadAllVisits();
                await loadProcessedRequests();
                applyFrontendMatching();
                renderVisitsPage();

                // Proposer l'ajout au calendrier
                const req = processedRequests.find(r => r.id === requestId) || {};
                const seller = activeSellers.find(s => s.id === sellerId);
                const visitTime = document.getElementById('ppVisitTime').value || null;
                proposeCalendarSync({
                    visit_date: visitDate,
                    visit_time: visitTime,
                    buyer_name: req.visitor_name || ''
                }, seller);
            } else {
                showToast('Erreur lors de la planification');
                btn.disabled = false;
                btn.textContent = 'Planifier la visite';
            }
        } catch (e) {
            console.error('[Visites] Portal plan error:', e);
            showToast('Erreur réseau');
            btn.disabled = false;
            btn.textContent = 'Planifier la visite';
        }
    }

    async function deleteProcessedRequest(requestId) {

        try {
            const userId = await getCurrentUserId();
            const { error } = await supabaseClient
                .from('visit_requests')
                .delete()
                .eq('id', requestId)
                .eq('user_id', userId);

            if (error) {
                console.error('[Visites] Delete request error:', error);
                showToast('Erreur lors de la suppression');
                return;
            }

            processedRequests = processedRequests.filter(r => r.id !== requestId);
            renderProcessedView();
            renderVisitsPage(); // MAJ les accordions
            showToast('Demande supprimée');
        } catch (e) {
            console.error('[Visites] Delete error:', e);
            showToast('Erreur réseau');
        }
    }

        // Re-matching frontend pour les demandes sans match
        applyFrontendMatching();

        console.log('[Visites] Loaded:', allVisits.length, 'visits,', activeSellers.length, 'sellers,', portalRequests.length, 'portal requests,', processedRequests.length, 'processed');

        updateMobileVisibility();
        renderVisitsPage();
        if (!isMobile()) {
            renderPortalBanner();
            document.getElementById('processedCount').textContent = processedRequests.length;
        }
        setupFilterListeners();

        // Resize handler pour basculer mobile/desktop
        let resizeTimer = null;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                updateMobileVisibility();
                renderVisitsPage();
                if (!isMobile()) {
                    renderPortalBanner();
                    document.getElementById('processedCount').textContent = processedRequests.length;
                }
            }, 200);
        });
    });
    </script>
</body>
</html>
