<!--
  Léon — Micro / Enregistrement vocal (micro.html)
  Interface d'enregistrement audio avec transcription vocale.
  Version mobile optimisée. Auth requise (js/auth.js)
-->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Léon. — Micro</title>
    <link rel="icon" type="image/svg+xml" href="/fav_leon.svg">
    <meta property="og:title" content="Léon. — Micro">
    <meta property="og:image" content="/img/F.png">
    <meta property="og:type" content="website">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/mobile.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/audio-recorder.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #FFFFFF;
            min-height: 100vh;
            color: #243B53;
            overflow-x: hidden;
        }

        /* ===== DESKTOP HEADER (classique, visible > 768px) ===== */
        .header-desktop {
            width: 100%;
            background: #FFFFFF;
            border-bottom: 1px solid #E5E7EB;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-desktop .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-desktop .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            margin-right: 48px;
            cursor: pointer;
        }

        .header-desktop .logo img { height: 36px; width: auto; }

        .nav-tabs { display: flex; align-items: center; gap: 0; }

        .nav-tab {
            color: #6B7280;
            text-decoration: none;
            padding: 20px 24px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.2s ease;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-tab i { font-size: 16px; }
        .nav-tab:hover { color: #243B53; }
        .nav-tab.active { color: #243b53; font-weight: 600; border-bottom-color: #243b53; }

        .header-desktop .header-actions { display: flex; align-items: center; gap: 12px; }

        /* User profile (desktop) */
        .user-profile { display: flex; align-items: center; gap: 8px; cursor: pointer; position: relative; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #E5E7EB; }
        .user-name { font-size: 14px; font-weight: 500; color: #374151; }
        .user-dropdown {
            position: absolute; top: 100%; right: 0; margin-top: 8px;
            background: white; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            border: 1px solid #E5E7EB; min-width: 180px; display: none; z-index: 1001;
        }
        .user-dropdown.show { display: block; }
        .user-dropdown a, .user-dropdown button {
            display: block; width: 100%; text-align: left; padding: 12px 16px;
            font-size: 14px; color: #374151; text-decoration: none; border: none;
            background: none; cursor: pointer; font-family: 'Inter', sans-serif;
        }
        .user-dropdown a:hover, .user-dropdown button:hover { background: #F9FAFB; }
        .user-dropdown button { border-top: 1px solid #E5E7EB; color: #EF4444; }

        /* ===== MOBILE HEADER (minimal) ===== */
        .header-mobile {
            display: none;
            padding: 16px 24px;
            align-items: center;
            justify-content: space-between;
        }

        .header-mobile .logo-mobile {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .header-mobile .logo-mobile img { height: 28px; width: auto; }

        .header-mobile .user-mobile {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-mobile .user-firstname {
            font-size: 15px;
            font-weight: 500;
            color: #64748B;
        }

        .header-mobile .user-avatar-mobile {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #E5E7EB;
        }

        .header-mobile .user-initial-mobile {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #243b53;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
        }

        /* ===== MAIN LAYOUT ===== */
        .micro-page {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ===== MIC ZONE ===== */
        .mic-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
            position: relative;
            transition: padding-top 0.4s ease;
        }

        .mic-zone.compact { padding-top: 24px; }

        .mic-btn-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mic-btn {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: none;
            background: #26a1e8;
            color: white;
            font-size: 48px;
            cursor: pointer;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 40px rgba(38, 161, 232, 0.3);
            transition: all 0.4s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .mic-btn:active { transform: scale(0.95); }

        /* Pulsation douce au repos */
        .mic-btn.idle { animation: pulse-idle 3s ease-in-out infinite; }

        @keyframes pulse-idle {
            0%, 100% { box-shadow: 0 8px 40px rgba(38, 161, 232, 0.3); }
            50% { box-shadow: 0 12px 56px rgba(38, 161, 232, 0.45); }
        }

        /* Enregistrement */
        .mic-btn.recording {
            background: #FF4757;
            box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4);
            animation: pulse-recording 1.2s ease-in-out infinite;
        }

        @keyframes pulse-recording {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.3); }
            50% { transform: scale(1.04); box-shadow: 0 0 0 24px rgba(255, 71, 87, 0); }
        }

        /* Ondes */
        .mic-waves {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 130px; height: 130px;
            border-radius: 50%;
            pointer-events: none;
            display: none;
        }

        .mic-waves.active { display: block; }

        .mic-waves::before, .mic-waves::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 2px solid rgba(255, 71, 87, 0.2);
            animation: wave-expand 2.4s ease-out infinite;
        }

        .mic-waves::after { animation-delay: 1.2s; }

        @keyframes wave-expand {
            0% { width: 130px; height: 130px; opacity: 0.6; }
            100% { width: 240px; height: 240px; opacity: 0; }
        }

        /* Processing */
        .mic-btn.processing {
            background: #243B53;
            cursor: default;
            animation: none;
            box-shadow: 0 8px 32px rgba(36, 59, 83, 0.2);
        }

        .mic-help {
            margin-top: 24px;
            font-size: 16px;
            color: #475569;
            text-align: center;
            letter-spacing: 0.01em;
            transition: all 0.3s;
        }

        .mic-subtitle {
            margin-top: 6px;
            font-size: 13px;
            color: #64748B;
            text-align: center;
            font-weight: 400;
            transition: opacity 0.3s;
        }

        .mic-zone.compact .mic-subtitle { opacity: 0; height: 0; margin: 0; overflow: hidden; }

        .spinner {
            display: inline-block;
            width: 20px; height: 20px;
            border: 2px solid #E2E8F0;
            border-top-color: #243b53;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== RESULT AREA ===== */
        .result-area {
            width: 100%;
            margin-top: 32px;
            padding-bottom: 120px;
        }

        /* ===== TRANSCRIPTION ===== */
        .transcription-zone { display: none; width: 100%; margin-bottom: 16px; }
        .transcription-zone.visible { display: block; }

        .transcription-card {
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 14px;
            padding: 14px 18px;
        }

        .transcription-label {
            font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: #94A3B8; margin-bottom: 6px;
        }

        .transcription-text {
            font-size: 14px; line-height: 1.5; color: #475569;
            cursor: pointer;
            border-radius: 6px;
            padding: 4px 6px;
            margin: -4px -6px;
            transition: background 0.15s;
        }
        .transcription-text:hover { background: #EDF2F7; }
        .transcription-text:active { background: #E2E8F0; }

        .transcription-edit-btn {
            margin-top: 8px;
            background: #F1F5F9; border: 1px solid #E2E8F0;
            color: #243b53; font-size: 13px; font-weight: 500;
            cursor: pointer; padding: 8px 14px;
            font-family: 'Inter', sans-serif;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            -webkit-tap-highlight-color: transparent;
        }
        .transcription-edit-btn:active { background: #E2E8F0; }

        .transcription-edit-area {
            width: 100%; min-height: 50px;
            border: 1px solid #CBD5E1; border-radius: 8px;
            padding: 10px 12px; font-size: 14px;
            font-family: 'Inter', sans-serif; color: #1E293B;
            resize: vertical; display: none;
        }
        .transcription-edit-area:focus { outline: none; border-color: #243b53; }

        .transcription-actions { display: flex; gap: 8px; margin-top: 8px; }
        .transcription-actions .btn-sm {
            padding: 8px 16px; border-radius: 8px;
            font-size: 13px; font-weight: 500;
            border: none; cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary-sm { background: #243b53; color: white; }
        .btn-ghost-sm { background: #F1F5F9; color: #64748B; }

        /* ===== ANALYSING ===== */
        .analysing-zone { display: none; width: 100%; text-align: center; margin-bottom: 16px; }
        .analysing-zone.visible { display: flex; flex-direction: column; align-items: center; }
        .analysing-avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; }
        .analysing-text { font-size: 14px; color: #94A3B8; }

        /* ===== CONFIRMATION CARD ===== */
        .confirmation-zone { display: none; width: 100%; }
        .confirmation-zone.visible { display: block; }

        .confirmation-card {
            background: #FFFFFF;
            border: 1px solid #E8EBF0;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        .confirmation-header {
            padding: 18px 20px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .confirmation-header-text {
            font-weight: 700;
            font-size: 16px;
            color: #1E293B;
            flex: 1;
        }

        .confirmation-close {
            background: none;
            border: none;
            cursor: pointer;
            color: #94A3B8;
            font-size: 20px;
            padding: 4px 8px;
            line-height: 1;
            border-radius: 6px;
            transition: background 0.15s, color 0.15s;
        }
        .confirmation-close:hover {
            background: #F1F5F9;
            color: #475569;
        }

        .confirmation-action {
            padding: 0 20px 16px;
            font-size: 15px;
            font-weight: 500;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .confirmation-action-emoji { font-size: 20px; }

        .confirmation-match {
            padding: 12px 20px;
            border-top: 1px solid #F1F5F9;
        }

        .match-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .match-checkbox {
            width: 18px; height: 18px;
            accent-color: #243b53;
            cursor: pointer;
            display: none;
        }
        .editing .match-checkbox { display: inline; }

        .match-arrow {
            color: #94A3B8;
            font-size: 13px;
        }

        .match-name {
            font-weight: 600;
            font-size: 14px;
            color: #1E293B;
        }

        .match-type {
            font-size: 10px;
            font-weight: 500;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .match-type.seller { background: #FEF3C7; color: #92400E; }
        .match-type.buyer { background: #DBEAFE; color: #1E40AF; }

        .match-confidence { display: none; }

        .match-note {
            font-size: 13px;
            color: #64748B;
            padding: 6px 0 2px 20px;
        }

        .match-note-edit {
            width: 100%; min-height: 36px;
            border: 1px solid #CBD5E1; border-radius: 8px;
            padding: 8px 10px; font-size: 13px;
            font-family: 'Inter', sans-serif; color: #1E293B;
            resize: vertical; display: none;
            margin-left: 20px; width: calc(100% - 20px);
        }

        .match-next-step {
            font-size: 12px; color: #243b53;
            display: flex; align-items: center;
            gap: 4px; padding: 4px 0 0 20px;
        }

        .match-reminder {
            display: flex; align-items: center;
            gap: 6px; margin-top: 4px; padding-left: 20px;
        }

        .match-reminder input[type="date"] {
            font-size: 12px; font-family: 'Inter', sans-serif;
            border: 1px solid #E2E8F0; border-radius: 6px;
            padding: 3px 8px; color: #475569;
        }

        .confirmation-footer {
            padding: 14px 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #F1F5F9;
        }

        .btn-confirm {
            flex: 1;
            padding: 13px 20px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-confirm.primary { background: #243b53; color: white; }
        .btn-confirm.primary:hover { background: #1a2f45; }
        .btn-confirm.primary:disabled { background: #CBD5E1; cursor: default; }
        .btn-confirm.secondary { background: #F1F5F9; color: #64748B; }
        .btn-confirm.secondary:hover { background: #E2E8F0; }

        /* ===== AMBIGUOUS ===== */
        .ambiguous-zone { display: none; width: 100%; margin-top: 12px; }
        .ambiguous-zone.visible { display: block; }

        .ambiguous-card {
            background: #FFFBEB; border: 1px solid #FDE68A;
            border-radius: 12px; padding: 14px 18px; margin-bottom: 8px;
        }
        .ambiguous-title { font-size: 13px; font-weight: 600; color: #92400E; margin-bottom: 8px; }
        .ambiguous-option {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; background: white;
            border: 1px solid #FDE68A; border-radius: 8px;
            margin-bottom: 6px; cursor: pointer; transition: all 0.2s;
        }
        .ambiguous-option:hover { border-color: #243b53; background: #F5F3FF; }
        .ambiguous-option-name { font-weight: 500; font-size: 14px; }
        .ambiguous-option-info { font-size: 12px; color: #64748B; }

        /* ===== NO MATCH / CREATE LEAD ===== */
        .no-match-zone { display: none; width: 100%; margin-top: 12px; }
        .no-match-zone.visible { display: block; }
        .no-match-card {
            background: #FEF2F2; border: 1px solid #FECACA;
            border-radius: 12px; padding: 16px 18px; text-align: center;
        }
        .no-match-text { font-size: 13px; color: #991B1B; margin-bottom: 10px; }
        .no-match-names { font-weight: 600; }

        /* Carte de création de lead depuis micro */
        .create-lead-card {
            background: #F8FAFC; border: 1px solid #E2E8F0;
            border-radius: 12px; padding: 16px 18px; margin-top: 10px; text-align: left;
        }
        .create-lead-title {
            font-family: 'Barlow Semi Condensed', sans-serif;
            font-weight: 700; font-size: 15px; color: #243B53;
            margin-bottom: 12px; text-align: center;
        }
        .create-lead-info { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; justify-content: center; }
        .create-lead-tag {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
        }
        .create-lead-tag.type-buyer { background: #DBEAFE; color: #1E40AF; }
        .create-lead-tag.type-seller { background: #FEF3C7; color: #92400E; }
        .create-lead-tag.budget { background: #D1FAE5; color: #065F46; }
        .create-lead-tag.property { background: #EDE9FE; color: #5B21B6; }
        .create-lead-tag.sector { background: #FEE2E2; color: #991B1B; }
        .create-lead-tag.criteria { background: #F3F4F6; color: #374151; }
        .create-lead-note {
            font-size: 13px; color: #475569; line-height: 1.5;
            background: white; border: 1px solid #E2E8F0; border-radius: 8px;
            padding: 10px 12px; margin-bottom: 12px;
        }
        .create-lead-type-btns {
            display: flex; gap: 8px; justify-content: center; margin-bottom: 10px;
        }
        .create-lead-type-btn {
            flex: 1; padding: 10px 12px; border-radius: 8px; border: 2px solid #E2E8F0;
            background: white; font-size: 13px; font-weight: 600; cursor: pointer;
            font-family: 'Inter', sans-serif; transition: all 0.15s;
        }
        .create-lead-type-btn:hover { border-color: #94A3B8; }
        .create-lead-type-btn.selected-buyer { border-color: #3B82F6; background: #EFF6FF; color: #1E40AF; }
        .create-lead-type-btn.selected-seller { border-color: #F59E0B; background: #FFFBEB; color: #92400E; }
        .create-lead-confirm {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            background: #243B53; color: white; font-size: 14px; font-weight: 600;
            font-family: 'Inter', sans-serif; cursor: pointer; transition: opacity 0.15s;
        }
        .create-lead-confirm:hover { opacity: 0.9; }
        .create-lead-confirm:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ===== ERROR ===== */
        .error-zone { display: none; width: 100%; margin-top: 12px; }
        .error-zone.visible { display: block; }
        .error-card {
            background: #FEF2F2; border: 1px solid #FECACA;
            border-radius: 12px; padding: 14px 18px; text-align: center;
        }
        .error-text { font-size: 13px; color: #991B1B; margin-bottom: 10px; line-height: 1.5; }

        /* Guide iOS pour activer le micro */
        .ios-mic-guide {
            text-align: left;
            margin: 12px 0 14px;
            padding: 0;
        }
        .ios-mic-guide .guide-title {
            font-size: 13px;
            font-weight: 600;
            color: #991B1B;
            margin-bottom: 10px;
            text-align: center;
        }
        .ios-mic-step {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
        }
        .ios-mic-step + .ios-mic-step {
            border-top: 1px solid #FECACA;
        }
        .ios-step-num {
            width: 24px; height: 24px;
            border-radius: 50%;
            background: #991B1B;
            color: white;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .ios-step-text {
            font-size: 13px;
            color: #7F1D1D;
            line-height: 1.4;
        }
        .ios-step-text strong {
            font-weight: 600;
        }

        /* Screenshot iOS : visible uniquement en mobile */
        .ios-mic-screenshot {
            display: none;
            width: 100%;
            max-width: 280px;
            margin: 12px auto 14px;
            border-radius: 10px;
            border: 1px solid #FECACA;
        }
        @media (max-width: 768px) {
            .ios-mic-screenshot { display: block; }
        }

        .btn-retry {
            padding: 10px 20px; background: #243b53; color: white;
            border: none; border-radius: 8px; font-size: 13px;
            font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif;
        }

        /* ===== SUCCESS OVERLAY ===== */
        .success-overlay {
            display: none;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.96);
            z-index: 10000;
            align-items: center; justify-content: center;
            flex-direction: column;
        }
        .success-overlay.visible { display: flex; }

        .success-check {
            width: 72px; height: 72px; border-radius: 50%;
            background: #10B981;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 36px;
            animation: success-pop 0.4s ease-out;
        }

        @keyframes success-pop {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }

        .success-text {
            margin-top: 14px; font-size: 16px;
            font-weight: 600; color: #065F46;
        }

        /* ===== HISTORY ===== */
        .history-zone {
            width: 100%;
            margin-top: 32px;
            padding-bottom: 20px;
        }

        .history-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #CBD5E1;
            margin-bottom: 8px;
        }

        /* ===== EXAMPLES ZONE ===== */
        .examples-zone {

        .example-item.active {
            display: flex;
            animation: example-fade-in 0.6s ease-out;
        }

        @keyframes example-fade-in {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }

        @keyframes fade-in-up {
            to { opacity: 1; transform: translateY(0); }

        .example-emoji { font-size: 20px; flex-shrink: 0; }

        /* ===== MOBILE OVERRIDES ===== */
        @media (max-width: 768px) {
            .m-todo-fab { display: none !important; }

    <script src="js/mobile-nav.js"></script>

    <script>
    (async function() {
        // ===== STATE =====
        let recorder = null;
        let currentTranscription = '';
        let currentResult = null;
        let isEditing = false;
        let allLeads = null;
        let history = [];
        let userId = null;

        // ===== DOM =====
        const micZone = document.getElementById('micZone');
        const micBtn = document.getElementById('micBtn');
        const micWaves = document.getElementById('micWaves');
        const micHelp = document.getElementById('micHelp');
        const transcriptionZone = document.getElementById('transcriptionZone');
        const transcriptionText = document.getElementById('transcriptionText');
        const transcriptionEditBtn = document.getElementById('transcriptionEditBtn');
        const transcriptionEditArea = document.getElementById('transcriptionEditArea');
        const transcriptionActions = document.getElementById('transcriptionActions');
        const transcriptionSaveBtn = document.getElementById('transcriptionSaveBtn');
        const transcriptionCancelBtn = document.getElementById('transcriptionCancelBtn');
        const analysingZone = document.getElementById('analysingZone');
        const confirmationZone = document.getElementById('confirmationZone');
        const confirmationAction = document.getElementById('confirmationAction');
        const confirmationMatches = document.getElementById('confirmationMatches');
        const confirmBtn = document.getElementById('confirmBtn');
        const editBtn = document.getElementById('editBtn');
        const confirmCloseBtn = document.getElementById('confirmCloseBtn');
        const ambiguousZone = document.getElementById('ambiguousZone');
        const noMatchZone = document.getElementById('noMatchZone');
        const errorZone = document.getElementById('errorZone');
        const historyList = document.getElementById('historyList');
        const successOverlay = document.getElementById('successOverlay');
        const successText = document.getElementById('successText');
        const examplesZone = document.getElementById('examplesZone');

        // ===== INIT =====
        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return;
            userId = session.user.id;

            // Set mobile firstname + avatar
            const meta = session.user.user_metadata || {};
            const firstName = (meta.full_name || meta.name || session.user.email || '').split(' ')[0];
            document.getElementById('userFirstname').textContent = firstName;

            const avatarContainer = document.getElementById('userAvatarMobile');
            const avatarUrl = meta.avatar_url || meta.picture || null;
            if (avatarUrl) {
                avatarContainer.innerHTML = `<img src="${avatarUrl}" alt="${firstName}" class="user-avatar-mobile" referrerpolicy="no-referrer">`;
            } else {
                const initial = (firstName || '?')[0].toUpperCase();
                avatarContainer.innerHTML = `<div class="user-initial-mobile">${initial}</div>`;
            }

            recorder = new AudioRecorder({
                maxDuration: 120000,    // 2 minutes max
                silenceTimeout: 6000,   // 6s de silence avant auto-stop
                silenceThreshold: 0.01,
                onStateChange: handleRecorderState
            });
        }

        function handleRecorderState(state, msg) {
            if (state === 'recording') setMicState('recording');
            else if (state === 'transcribing') setMicState('transcribing');
            else if (state === 'requesting_permission') setMicState('requesting_permission');
            else if (state === 'error') { setMicState('idle'); showError(msg || 'Erreur d\'enregistrement'); }
        }

        // ===== MIC STATES =====
        function setMicState(state) {
            micBtn.className = 'mic-btn';
            micWaves.classList.remove('active');

            switch (state) {
                case 'idle':
                    micBtn.classList.add('idle');
                    micBtn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
                    micHelp.textContent = 'Appuyez et parlez à Léon';
                    micBtn.disabled = false;
                    micZone.classList.remove('compact');
                    break;
                case 'recording':
                    micBtn.classList.add('recording');
                    micBtn.innerHTML = '<i class="fa-solid fa-stop"></i>';
                    micWaves.classList.add('active');
                    micHelp.textContent = 'Je t\'écoute...';
                    micBtn.disabled = false;
                    break;
                case 'transcribing':
                    micBtn.classList.add('processing');
                    micBtn.innerHTML = '<span class="spinner" style="border-top-color:white;width:32px;height:32px;border-width:3px;margin:0"></span>';
                    micHelp.textContent = 'Transcription...';
                    micBtn.disabled = true;
                    micZone.classList.add('compact');
                    break;
                case 'requesting_permission':
                    micBtn.classList.add('processing');
                    micBtn.innerHTML = '<i class="fa-solid fa-shield-halved" style="font-size:36px"></i>';
                    micHelp.textContent = 'Autorisez le micro quand le dialogue apparaît';
                    micBtn.disabled = true;
                    break;
                case 'analysing':
                    micBtn.classList.add('processing');
                    micBtn.innerHTML = '<span class="spinner" style="border-top-color:white;width:32px;height:32px;border-width:3px;margin:0"></span>';
                    micHelp.textContent = 'Léon analyse...';
                    micBtn.disabled = true;
                    micZone.classList.add('compact');
                    break;
            }
        }

        // ===== HIDE ALL =====
        function hideAllZones() {
            transcriptionZone.classList.remove('visible');
            analysingZone.classList.remove('visible');
            confirmationZone.classList.remove('visible');
            ambiguousZone.classList.remove('visible');
            noMatchZone.classList.remove('visible');
            errorZone.classList.remove('visible');
        }

        // Retour à l'état initial (bouton Réessayer)
        function resetToIdle() {
            hideAllZones();
            setMicState('idle');
            micZone.classList.remove('compact');
            currentResult = null;
            allLeads = null;
            examplesZone.classList.remove('hidden');
            startExamplesCarousel();
        }

        // ===== RECORD FLOW =====
        micBtn.addEventListener('click', async () => {
            if (recorder && recorder.isRecording) { recorder.stop(); return; }

            // Garde : userId doit être défini avant d'enregistrer
            if (!userId) {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) userId = session.user.id;
                if (!userId) {
                    showError('Session expirée — reconnectez-vous');
                    return;
                }
            }

            hideAllZones();
            stopExamplesCarousel();
            examplesZone.classList.add('hidden');
            currentResult = null;
            isEditing = false;

            try {
                const text = await recorder.record();
                if (!text || !text.trim()) { setMicState('idle'); return; }

                currentTranscription = text.trim();
                showTranscription(currentTranscription);
                await analyseTranscription(currentTranscription);
            } catch (err) {
                setMicState('idle');
                if (err.message) showError(err.message);
            }
        });

        // ===== TRANSCRIPTION =====
        function showTranscription(text) {
            transcriptionText.textContent = text;
            transcriptionText.style.display = '';      // Reset après enterEditMode
            transcriptionEditArea.value = text;
            transcriptionEditBtn.style.display = '';
            transcriptionEditArea.style.display = 'none';
            transcriptionActions.style.display = 'none';
            transcriptionZone.classList.add('visible');
        }

        function enterEditMode() {
            transcriptionEditArea.value = currentTranscription;
            transcriptionText.style.display = 'none';
            transcriptionEditBtn.style.display = 'none';
            transcriptionEditArea.style.display = 'block';
            transcriptionActions.style.display = 'flex';
            transcriptionEditArea.focus();
            // Scroll vers la zone d'édition sur mobile
            setTimeout(() => transcriptionEditArea.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
        }

        transcriptionEditBtn.addEventListener('click', enterEditMode);
        transcriptionText.addEventListener('click', enterEditMode);

        transcriptionCancelBtn.addEventListener('click', () => {
            transcriptionText.style.display = '';
            transcriptionEditBtn.style.display = '';
            transcriptionEditArea.style.display = 'none';
            transcriptionActions.style.display = 'none';
        });

        transcriptionSaveBtn.addEventListener('click', async () => {
            const newText = transcriptionEditArea.value.trim();
            if (!newText) return;
            currentTranscription = newText;
            transcriptionText.textContent = newText;
            transcriptionText.style.display = '';
            transcriptionEditBtn.style.display = '';
            transcriptionEditArea.style.display = 'none';
            transcriptionActions.style.display = 'none';
            await analyseTranscription(newText);
        });

        // ===== LOAD LEADS =====
        async function loadUserLeads() {
            // Ne pas cacher un résultat vide ([] est truthy en JS)
            if (allLeads && allLeads.length > 0) return allLeads;

            try {
                const [sellersRes, buyersRes] = await Promise.all([
                    supabaseClient.from('sellers')
                        .select('id, first_name, last_name, phone, address, status')
                        .eq('user_id', userId)
                        .order('updated_at', { ascending: false }).limit(500),
                    supabaseClient.from('buyers')
                        .select('id, first_name, last_name, phone, sector, status')
                        .eq('user_id', userId)
                        .order('updated_at', { ascending: false }).limit(500)
                ]);

                if (sellersRes.error) console.error('[Micro] Erreur chargement vendeurs:', sellersRes.error);
                if (buyersRes.error) console.error('[Micro] Erreur chargement acquéreurs:', buyersRes.error);

                const sellers = (sellersRes.data || []).map(s => ({ id: s.id, type: 'seller', first_name: s.first_name, last_name: s.last_name, phone: s.phone, address: s.address }));
                const buyers = (buyersRes.data || []).map(b => ({ id: b.id, type: 'buyer', first_name: b.first_name, last_name: b.last_name, phone: b.phone, sector: b.sector }));
                allLeads = [...sellers, ...buyers];

                if (allLeads.length === 0) {
                    console.warn('[Micro] Aucun lead chargé pour userId:', userId);
                }

                return allLeads;
            } catch (err) {
                console.error('[Micro] loadUserLeads error:', err);
                return [];
            }
        }

        function preFilterLeads(leads, transcription) {
            // Split sur espaces ET apostrophes pour gérer "d'Elsa", "l'acquéreur", etc.
            const words = transcription.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').split(/[\s''\u2019`]+/).filter(w => w.length > 2);
            const matched = leads.filter(lead => {
                const fullName = `${lead.first_name || ''} ${lead.last_name || ''}`.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                return words.some(word => fullName.includes(word));
            });
            return matched.length === 0 ? leads.slice(0, 50) : matched;
        }

        // ===== ANALYSE =====
        const ANALYSIS_TIMEOUT_MS = 25000; // Timeout client pour l'analyse

        async function analyseTranscription(text) {
            setMicState('analysing');
            analysingZone.classList.add('visible');
            confirmationZone.classList.remove('visible');
            ambiguousZone.classList.remove('visible');
            noMatchZone.classList.remove('visible');
            errorZone.classList.remove('visible');

            try {
                const leads = await loadUserLeads();
                const relevant = preFilterLeads(leads, text);
                const today = new Date().toISOString().split('T')[0];
                const headers = await getAuthHeaders();

                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), ANALYSIS_TIMEOUT_MS);

                const response = await fetch('/api/parse-voice-note', {
                    method: 'POST', headers,
                    body: JSON.stringify({ transcription: text, leads: relevant, today }),
                    signal: controller.signal
                });
                clearTimeout(timeout);

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.error || 'Analyse échouée');
                }

                currentResult = await response.json();
                analysingZone.classList.remove('visible');
                setMicState('idle');
                micZone.classList.add('compact');
                showResult(currentResult);
            } catch (err) {
                analysingZone.classList.remove('visible');
                setMicState('idle');
                const msg = err.name === 'AbortError'
                    ? 'L\'analyse a pris trop de temps. Réessayez.'
                    : (err.message || 'Erreur lors de l\'analyse');
                showError(msg);
            }
        }

        // Scroll automatique vers la zone de résultat sur mobile
        function scrollToResult(el) {
            if (!el) return;
            setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 150);
        }

        // ===== SHOW RESULT =====
        function showResult(result) {
            const hasMatches = result.contacts_matched && result.contacts_matched.length > 0;
            const hasAmbiguous = result.ambiguous_contacts && result.ambiguous_contacts.length > 0;
            const hasUnmatched = result.unmatched_contacts && result.unmatched_contacts.length > 0;

            if (hasMatches) showConfirmation(result);
            if (hasAmbiguous) showAmbiguous(result.ambiguous_contacts);
            // Toujours afficher les contacts non-trouvés (création de lead)
            // même s'il y a des matches existants à côté
            if (hasUnmatched) showNoMatch(result.unmatched_contacts);
            if (!hasMatches && !hasAmbiguous && !hasUnmatched) showNoMatch(['(aucun contact identifié)']);
        }

        // ===== CONFIRMATION =====
        function showConfirmation(result) {
            confirmationAction.innerHTML = `<span class="confirmation-action-emoji"></span>${escHtml(result.action_understood || '')}`;

            let html = '';
            result.contacts_matched.forEach((match, i) => {
                const typeClass = match.lead_type === 'seller' ? 'seller' : 'buyer';
                const typeLabel = match.lead_type === 'seller' ? 'vendeur' : 'acquéreur';

                html += `
                <div class="confirmation-match" data-index="${i}">
                    <div class="match-header">
                        <input type="checkbox" class="match-checkbox" data-index="${i}" checked>
                        <span class="match-arrow">→</span>
                        <span class="match-name">${escHtml(match.lead_name)}</span>
                        <span class="match-type ${typeClass}">${typeLabel}</span>
                    </div>
                    <div class="match-note" data-index="${i}">${escHtml(match.note_content)}</div>
                    <textarea class="match-note-edit" data-index="${i}">${escHtml(match.note_content)}</textarea>
                    ${match.next_step ? `<div class="match-next-step"><i class="fa-solid fa-lightbulb" style="font-size:11px"></i> ${escHtml(match.next_step)}</div>` : ''}
                    ${match.reminder_date ? `<div class="match-reminder"><i class="fa-solid fa-calendar" style="font-size:11px;color:#94A3B8"></i><input type="date" data-index="${i}" value="${match.reminder_date}"></div>` : ''}
                </div>`;
            });

            confirmationMatches.innerHTML = html;
            confirmationZone.classList.add('visible');
            scrollToResult(confirmationZone);
        }

        // ===== CLOSE CONFIRMATION =====
        confirmCloseBtn.addEventListener('click', () => {
            hideAllZones();
            setMicState('idle');
            examplesZone.classList.remove('hidden');
            startExamplesCarousel();
        });

        // ===== EDIT MODE =====
        editBtn.addEventListener('click', () => {
            isEditing = !isEditing;
            const card = confirmationZone.querySelector('.confirmation-card');
            card.classList.toggle('editing', isEditing);

            const notes = confirmationMatches.querySelectorAll('.match-note');
            const edits = confirmationMatches.querySelectorAll('.match-note-edit');
            notes.forEach(el => el.style.display = isEditing ? 'none' : '');
            edits.forEach(el => el.style.display = isEditing ? '' : 'none');

            editBtn.textContent = isEditing ? 'Aperçu' : 'Modifier';
        });

        // ===== CONFIRM =====
        confirmBtn.addEventListener('click', async () => {
            if (!currentResult || !currentResult.contacts_matched) return;
            confirmBtn.disabled = true;
            confirmBtn.innerHTML = '<span class="spinner" style="border-top-color:white;width:16px;height:16px;margin:0"></span>';

            try {
                const matches = currentResult.contacts_matched;
                let saved = 0;

                for (let i = 0; i < matches.length; i++) {
                    const match = matches[i];
                    const checkbox = confirmationMatches.querySelector(`.match-checkbox[data-index="${i}"]`);
                    if (checkbox && !checkbox.checked) continue;

                    const editArea = confirmationMatches.querySelector(`.match-note-edit[data-index="${i}"]`);
                    const noteContent = (editArea && editArea.value.trim()) || match.note_content;

                    const noteCol = match.lead_type === 'seller' ? 'seller_id' : 'buyer_id';
                    await supabaseClient.from('lead_notes').insert({
                        user_id: userId, [noteCol]: match.lead_id, content: noteContent
                    });

                    const dateInput = confirmationMatches.querySelector(`input[type="date"][data-index="${i}"]`);
                    const reminderDate = dateInput ? dateInput.value : match.reminder_date;

                    const table = match.lead_type === 'seller' ? 'sellers' : 'buyers';
                    const updates = { updated_at: new Date().toISOString() };
                    if (reminderDate) updates.reminder = reminderDate;

                    await supabaseClient.from(table).update(updates).eq('id', match.lead_id).eq('user_id', userId);
                    saved++;
                }

                addToHistory(currentResult, saved);

                successText.textContent = saved === 1 ? '1 note enregistrée !' : `${saved} notes enregistrées !`;
                successOverlay.classList.add('visible');

                setTimeout(() => {
                    successOverlay.classList.remove('visible');
                    hideAllZones();
                    setMicState('idle');
                    currentResult = null;
                    allLeads = null;
                }, 1600);
            } catch (err) {
                console.error('Confirm error:', err);
                showError('Erreur : ' + err.message);
            } finally {
                confirmBtn.disabled = false;
                confirmBtn.textContent = 'Confirmer';
            }
        });

        // ===== AMBIGUOUS =====
        function showAmbiguous(ambiguousContacts) {
            let html = '';
            ambiguousContacts.forEach(amb => {
                const matches = Array.isArray(amb.possible_matches) ? amb.possible_matches : [];

                // Si Claude n'a pas fourni les matches, chercher dans les leads locaux
                let resolvedMatches = matches;
                if (matches.length === 0 && allLeads) {
                    const searchName = (amb.name_mentioned || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
                    if (!searchName) return;
                    resolvedMatches = allLeads.filter(lead => {
                        const fn = (lead.first_name || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
                        const ln = (lead.last_name || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
                        return fn === searchName || ln === searchName || `${fn} ${ln}` === searchName;
                    }).map(lead => ({
                        lead_id: lead.id,
                        lead_type: lead.type,
                        lead_name: `${lead.first_name || ''} ${lead.last_name || ''}`.trim()
                    }));
                }

                if (resolvedMatches.length === 0) return;

                html += `<div class="ambiguous-card">
                    <div class="ambiguous-title">Plusieurs « ${escHtml(amb.name_mentioned)} » trouvés :</div>`;
                resolvedMatches.forEach(pm => {
                    const name = pm.lead_name || `${pm.first_name || ''} ${pm.last_name || ''}`.trim() || 'Sans nom';
                    const type = pm.lead_type || pm.type || 'seller';
                    html += `<div class="ambiguous-option" data-name-mentioned="${escAttr(amb.name_mentioned)}" data-lead-id="${pm.lead_id}" data-lead-type="${type}" data-lead-name="${escAttr(name)}">
                        <span class="ambiguous-option-name">${escHtml(name)}</span>
                        <span class="ambiguous-option-info">${type === 'buyer' ? 'acquéreur' : 'vendeur'}</span>
                    </div>`;
                });
                html += '</div>';
            });

            if (!html) return;
            ambiguousZone.innerHTML = html;
            ambiguousZone.classList.add('visible');
            scrollToResult(ambiguousZone);

            // Event delegation for clicks
            ambiguousZone.querySelectorAll('.ambiguous-option').forEach(el => {
                el.addEventListener('click', function() {
                    const nameMentioned = this.dataset.nameMentioned;
                    const leadId = this.dataset.leadId;
                    const leadType = this.dataset.leadType;
                    const leadName = this.dataset.leadName;

                    if (!currentResult) return;
                    if (!currentResult.contacts_matched) currentResult.contacts_matched = [];
                    currentResult.contacts_matched.push({
                        lead_id: leadId, lead_type: leadType, lead_name: leadName,
                        confidence: 'high',
                        note_content: `📝 ${currentResult.action_understood || currentTranscription}`,
                        next_step: null, reminder_date: null
                    });
                    if (currentResult.ambiguous_contacts) {
                        currentResult.ambiguous_contacts = currentResult.ambiguous_contacts.filter(a => a.name_mentioned !== nameMentioned);
                    }
                    ambiguousZone.classList.remove('visible');
                    showConfirmation(currentResult);
                });
            });
        }

        // ===== NO MATCH / CREATE LEAD =====
        function showNoMatch(contacts) {
            // Backward compat : si c'est un tableau de strings (ancien format ou "(aucun contact)")
            const isLegacy = contacts.length > 0 && typeof contacts[0] === 'string';

            if (isLegacy) {
                // Cas "(aucun contact identifié)" ou ancien format — simple message + retry
                noMatchZone.innerHTML = `
                    <div class="no-match-card">
                        <p class="no-match-text">Léon n'a pas trouvé <span class="no-match-names">${contacts.map(n => escHtml(n)).join(', ')}</span></p>
                        <button class="btn-retry" onclick="resetToIdle()"><i class="fa-solid fa-rotate-right"></i> Réessayer</button>
                    </div>`;
                noMatchZone.classList.add('visible');
                scrollToResult(noMatchZone);
                return;
            }

            // Nouveau format : objets avec données structurées — proposer la création
            let html = '';
            contacts.forEach((contact, idx) => {
                const name = escHtml(contact.name || `${contact.first_name || ''} ${contact.last_name || ''}`.trim());
                const suggestedType = contact.suggested_type || 'seller';
                const isBuyer = suggestedType === 'buyer';

                // Tags d'info extraites
                let tagsHtml = '';
                if (contact.budget_max) {
                    const budgetStr = new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(contact.budget_max);
                    tagsHtml += `<span class="create-lead-tag budget"><i class="fa-solid fa-coins" style="font-size:10px"></i> ${budgetStr}</span>`;
                }
                if (contact.property_type) {
                    const typeLabels = { appartement: 'Appartement', maison: 'Maison', terrain: 'Terrain', immeuble: 'Immeuble' };
                    tagsHtml += `<span class="create-lead-tag property"><i class="fa-solid fa-home" style="font-size:10px"></i> ${typeLabels[contact.property_type] || contact.property_type}</span>`;
                }
                if (contact.sector) {
                    tagsHtml += `<span class="create-lead-tag sector"><i class="fa-solid fa-map-marker-alt" style="font-size:10px"></i> ${escHtml(contact.sector)}</span>`;
                }
                if (contact.criteria && contact.criteria.length > 0) {
                    contact.criteria.forEach(c => {
                        tagsHtml += `<span class="create-lead-tag criteria">${escHtml(c)}</span>`;
                    });
                }

                // Note preview
                const noteText = contact.note_content || currentTranscription;

                html += `
                <div class="no-match-card" style="margin-bottom:10px">
                    <p class="no-match-text" style="margin-bottom:6px">Nouveau contact : <span class="no-match-names">${name}</span></p>
                    <div class="create-lead-card" data-contact-idx="${idx}">
                        ${tagsHtml ? `<div class="create-lead-info">${tagsHtml}</div>` : ''}
                        ${noteText ? `<div class="create-lead-note">${escHtml(noteText)}</div>` : ''}
                        <div class="create-lead-type-btns">
                            <button class="create-lead-type-btn ${isBuyer ? 'selected-buyer' : ''}" data-idx="${idx}" data-type="buyer" onclick="selectLeadType(this, ${idx}, 'buyer')">
                                <i class="fa-solid fa-user-tag"></i> Acquéreur
                            </button>
                            <button class="create-lead-type-btn ${!isBuyer ? 'selected-seller' : ''}" data-idx="${idx}" data-type="seller" onclick="selectLeadType(this, ${idx}, 'seller')">
                                <i class="fa-solid fa-building"></i> Vendeur
                            </button>
                        </div>
                        <button class="create-lead-confirm" data-idx="${idx}" onclick="createNewLeadFromMicro(${idx})">
                            <i class="fa-solid fa-plus"></i> Créer ${isBuyer ? 'l\'acquéreur' : 'le vendeur'}
                        </button>
                    </div>
                </div>`;
            });

            // Stocker les contacts pour la création
            window._pendingNewLeads = contacts;

            noMatchZone.innerHTML = html;
            noMatchZone.classList.add('visible');
            scrollToResult(noMatchZone);
        }

        // Sélection du type vendeur/acquéreur
        function selectLeadType(btn, idx, type) {
            const card = btn.closest('.create-lead-card');
            card.querySelectorAll('.create-lead-type-btn').forEach(b => {
                b.classList.remove('selected-buyer', 'selected-seller');
            });
            btn.classList.add(type === 'buyer' ? 'selected-buyer' : 'selected-seller');

            const confirmBtn = card.querySelector('.create-lead-confirm');
            confirmBtn.innerHTML = type === 'buyer'
                ? '<i class="fa-solid fa-plus"></i> Créer l\'acquéreur'
                : '<i class="fa-solid fa-plus"></i> Créer le vendeur';
            confirmBtn.dataset.selectedType = type;
        }

        // Création du lead directement depuis micro
        async function createNewLeadFromMicro(idx) {
            const contact = window._pendingNewLeads?.[idx];
            if (!contact || !userId) return;

            const card = noMatchZone.querySelector(`.create-lead-card[data-contact-idx="${idx}"]`);
            const confirmBtn = card?.querySelector('.create-lead-confirm');
            if (!confirmBtn) return;

            // Déterminer le type (depuis le bouton sélectionné ou le suggested_type)
            const selectedType = confirmBtn.dataset.selectedType
                || (card.querySelector('.selected-buyer') ? 'buyer' : null)
                || (card.querySelector('.selected-seller') ? 'seller' : null)
                || contact.suggested_type || 'seller';
            const table = selectedType === 'buyer' ? 'buyers' : 'sellers';

            confirmBtn.disabled = true;
            confirmBtn.innerHTML = '<span class="spinner" style="border-top-color:white;width:16px;height:16px;margin:0"></span>';

            try {
                // Préparer les données du lead
                const firstName = contact.first_name || contact.name?.split(' ')[0] || '';
                const lastName = contact.last_name || contact.name?.split(' ').slice(1).join(' ') || '';

                // Statut par défaut : 'hot' pour vendeurs (1ère colonne), 'nouveau' pour acquéreurs
                const defaultStatus = selectedType === 'buyer' ? 'nouveau' : 'hot';
                const leadData = {
                    user_id: userId,
                    first_name: firstName,
                    last_name: lastName,
                    status: defaultStatus
                };

                // Téléphone : nettoyage (points/tirets → espaces)
                if (contact.phone) {
                    leadData.phone = contact.phone.replace(/[\.\-]/g, ' ').replace(/\s+/g, ' ').trim();
                }
                if (contact.email) leadData.email = contact.email;

                // Champs communs vendeurs & acquéreurs
                if (contact.property_type) leadData.property_type = contact.property_type;

                // Champs spécifiques aux acquéreurs
                if (selectedType === 'buyer') {
                    leadData.contact_date = new Date().toISOString().split('T')[0];
                    if (contact.budget_max) leadData.budget_max = contact.budget_max;
                    if (contact.rooms) leadData.rooms = contact.rooms;
                    if (contact.sector) leadData.city = contact.sector;
                    if (contact.criteria && contact.criteria.length > 0) leadData.criteria = contact.criteria;
                }

                // Champs spécifiques aux vendeurs
                if (selectedType === 'seller') {
                    if (contact.source) leadData.source = contact.source;
                    if (contact.referrer_name) leadData.referrer_name = contact.referrer_name;
                    if (contact.budget) leadData.budget = contact.budget;
                    if (contact.address) leadData.address = contact.address;
                    if (contact.rooms) leadData.rooms = contact.rooms;
                }

                // Date de relance
                if (contact.reminder_date) leadData.reminder = contact.reminder_date;

                // Insérer le lead
                const { data, error } = await supabaseClient.from(table).insert([leadData]).select();
                if (error) throw new Error(error.message);
                const newLead = data[0];
                if (window.awardPoints) window.awardPoints('create_lead', { lead_id: newLead?.id, lead_type: selectedType });

                // Ajouter la transcription comme première note
                const noteContent = contact.note_content || currentTranscription;
                if (noteContent && newLead) {
                    const noteCol = selectedType === 'buyer' ? 'buyer_id' : 'seller_id';
                    await supabaseClient.from('lead_notes').insert({
                        user_id: userId,
                        [noteCol]: newLead.id,
                        content: `🎙️ ${noteContent}`
                    });
                }

                // Notifier le parent (pipeline) pour rafraîchir
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({ type: 'lead-created', leadType: selectedType }, '*');
                }

                // Succès
                successText.textContent = `${firstName} ${lastName} créé(e) !`;
                successOverlay.classList.add('visible');
                setTimeout(() => {
                    successOverlay.classList.remove('visible');
                    hideAllZones();
                    setMicState('idle');
                    currentResult = null;
                    allLeads = null;
                    window._pendingNewLeads = null;
                }, 1600);
            } catch (err) {
                console.error('[Micro] Erreur création lead:', err);
                showError('Erreur lors de la création : ' + err.message);
            } finally {
                confirmBtn.disabled = false;
                confirmBtn.innerHTML = '<i class="fa-solid fa-plus"></i> Créer';
            }
        }

        // ===== ERROR =====
        function showError(msg) {
            // Détection du marqueur iOS pour afficher un guide étape par étape
            if (msg && msg.startsWith('__IOS_MIC_BLOCKED__')) {
                const browserName = msg.replace('__IOS_MIC_BLOCKED__', '');
                const errorCard = errorZone.querySelector('.error-card');
                errorCard.innerHTML = `
                    <div class="ios-mic-guide">
                        <p class="guide-title"><i class="fa-solid fa-lock" style="margin-right:4px"></i> Micro bloqué sur iPhone</p>
                        <div class="ios-mic-step">
                            <span class="ios-step-num">1</span>
                            <span class="ios-step-text">Ouvrez l'app <strong>Réglages</strong> de votre iPhone</span>
                        </div>
                        <div class="ios-mic-step">
                            <span class="ios-step-num">2</span>
                            <span class="ios-step-text">Appuyez sur <strong>Apps</strong></span>
                        </div>
                        <div class="ios-mic-step">
                            <span class="ios-step-num">3</span>
                            <span class="ios-step-text">Appuyez sur <strong>${browserName}</strong></span>
                        </div>
                        <div class="ios-mic-step">
                            <span class="ios-step-num">4</span>
                            <span class="ios-step-text">Activez <strong>Microphone</strong> <i class="fa-solid fa-toggle-on" style="color:#10B981"></i></span>
                        </div>
                        <div class="ios-mic-step">
                            <span class="ios-step-num">5</span>
                            <span class="ios-step-text">Revenez ici et réessayez</span>
                        </div>
                    </div>
                    <img src="img/micro_auth.svg" alt="Activer le micro" class="ios-mic-screenshot">
                    <button class="btn-retry" id="retryBtnIos">Réessayer</button>`;
                // Re-bind le bouton retry
                errorCard.querySelector('#retryBtnIos').addEventListener('click', async () => {
                    errorZone.classList.remove('visible');
                    if (currentTranscription) await analyseTranscription(currentTranscription);
                    else setMicState('idle');
                });
            } else {
                // Erreur classique (non-iOS)
                const errorCard = errorZone.querySelector('.error-card');
                errorCard.innerHTML = `
                    <p class="error-text" id="errorText">${escHtml(msg || 'Léon n\'a pas pu analyser.')}</p>
                    <button class="btn-retry" id="retryBtnStd">Réessayer</button>`;
                errorCard.querySelector('#retryBtnStd').addEventListener('click', async () => {
                    errorZone.classList.remove('visible');
                    if (currentTranscription) await analyseTranscription(currentTranscription);
                    else setMicState('idle');
                });
            }
            errorZone.classList.add('visible');
            scrollToResult(errorZone);
        }

        // Note : le retry est géré dynamiquement dans showError()

        // ===== HISTORY =====
        function addToHistory(result, savedCount) {
            const now = new Date();
            const time = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            const contacts = (result.contacts_matched || []).map(m => {
                const parts = m.lead_name.split(' ');
                return parts[0] + (parts.length > 1 ? ' ' + parts[parts.length-1][0] + '.' : '');
            }).join(' + ');

            history.unshift({ time, action: result.action_understood || 'Note ajoutée', contacts, count: savedCount });
            if (history.length > 10) history = history.slice(0, 10);
            renderHistory();
        }

        function renderHistory() {
            if (history.length === 0) { historyList.innerHTML = ''; return; }

            historyList.innerHTML = '<div class="history-title">Historique</div>' +
                history.map(h => `
                <div class="history-item">
                    <span class="history-time">${h.time}</span>
                    <span class="history-sep">—</span>
                    <span class="history-action">${escHtml(h.action)}</span>
                    <span class="history-check"><i class="fa-solid fa-circle-check"></i></span>
                </div>`).join('');
        }

        // ===== EXAMPLES CAROUSEL =====
        let exampleIndex = 0;
        let exampleInterval = null;

        function startExamplesCarousel() {
            const items = examplesZone.querySelectorAll('.example-item');
            if (items.length === 0) return;
            items[exampleIndex].classList.add('active');
            exampleInterval = setInterval(() => {
                items[exampleIndex].classList.remove('active');
                exampleIndex = (exampleIndex + 1) % items.length;
                items[exampleIndex].classList.add('active');
            }, 3000);
        }

        function stopExamplesCarousel() {
            if (exampleInterval) { clearInterval(exampleInterval); exampleInterval = null; }
        }

        // ===== UTILS =====
        function escHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function escAttr(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // Exposer les fonctions appelées depuis onclick HTML (hors de la closure IIFE)
        window.resetToIdle = resetToIdle;
        window.selectLeadType = selectLeadType;
        window.createNewLeadFromMicro = createNewLeadFromMicro;

        // ===== START =====
        init();
        startExamplesCarousel();
    })();
    </script>
</body>
</html>
