<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Léon. — Micro</title>
    <link rel="icon" type="image/svg+xml" href="/fav_leon.svg">
    <meta property="og:title" content="Léon. — Micro">
    <meta property="og:image" content="/img/F.png">
    <meta property="og:type" content="website">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/audio-recorder.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #FFFFFF;
            min-height: 100vh;
            color: #243B53;
            overflow-x: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            width: 100%;
            background: #FFFFFF;
            border-bottom: 1px solid #E5E7EB;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            margin-right: 48px;
            cursor: pointer;
        }

        .logo img { height: 36px; width: auto; }

        .nav-tabs { display: flex; align-items: center; gap: 0; }

        .nav-tab {
            color: #6B7280;
            text-decoration: none;
            padding: 20px 24px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.2s ease;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-tab i { font-size: 16px; }
        .nav-tab:hover { color: #243B53; }
        .nav-tab.active { color: #6C4CC8; font-weight: 600; border-bottom-color: #6C4CC8; }

        .header-actions { display: flex; align-items: center; gap: 12px; }

        .settings-btn {
            color: #6B7280;
            text-decoration: none;
            font-size: 18px;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .settings-btn:hover { color: #243B53; background: #F3F4F6; }

        .user-profile { display: flex; align-items: center; gap: 8px; cursor: pointer; position: relative; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #E5E7EB; }
        .user-name { font-size: 14px; font-weight: 500; color: #374151; }
        .user-dropdown {
            position: absolute; top: 100%; right: 0; margin-top: 8px;
            background: white; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            border: 1px solid #E5E7EB; min-width: 180px; display: none; z-index: 1001;
        }
        .user-dropdown.show { display: block; }
        .user-dropdown a, .user-dropdown button {
            display: block; width: 100%; text-align: left; padding: 12px 16px;
            font-size: 14px; color: #374151; text-decoration: none; border: none;
            background: none; cursor: pointer; font-family: 'Inter', sans-serif;
        }
        .user-dropdown a:hover, .user-dropdown button:hover { background: #F9FAFB; }
        .user-dropdown button { border-top: 1px solid #E5E7EB; color: #EF4444; }

        /* ===== MAIN CONTENT ===== */
        .micro-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 40px 24px 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: calc(100vh - 64px);
        }

        /* ===== MIC BUTTON ===== */
        .mic-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
        }

        .mic-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: #6C4CC8;
            color: white;
            font-size: 48px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(108, 76, 200, 0.3);
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .mic-btn:active { transform: scale(0.95); }

        /* Pulsation subtile au repos */
        .mic-btn.idle { animation: pulse-idle 3s ease-in-out infinite; }

        @keyframes pulse-idle {
            0%, 100% { box-shadow: 0 8px 32px rgba(108, 76, 200, 0.3); }
            50% { box-shadow: 0 8px 48px rgba(108, 76, 200, 0.5); }
        }

        /* Enregistrement : rouge pulsant */
        .mic-btn.recording {
            background: #FF4757;
            animation: pulse-recording 1s ease-in-out infinite;
        }

        @keyframes pulse-recording {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(255, 71, 87, 0); }
        }

        /* Ondes audio pendant l'enregistrement */
        .mic-waves {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            pointer-events: none;
            display: none;
        }

        .mic-btn.recording ~ .mic-waves { display: block; }

        .mic-waves::before, .mic-waves::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 2px solid rgba(255, 71, 87, 0.3);
            animation: wave-expand 2s ease-out infinite;
        }

        .mic-waves::after { animation-delay: 1s; }

        @keyframes wave-expand {
            0% { width: 120px; height: 120px; opacity: 1; }
            100% { width: 200px; height: 200px; opacity: 0; }
        }

        /* Processing states */
        .mic-btn.processing {
            background: #243B53;
            cursor: default;
            animation: none;
        }

        .mic-help {
            margin-top: 20px;
            font-size: 15px;
            color: #64748B;
            text-align: center;
        }

        /* ===== TRANSCRIPTION ZONE ===== */
        .transcription-zone {
            width: 100%;
            margin-top: 32px;
            display: none;
        }

        .transcription-zone.visible { display: block; }

        .transcription-card {
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 16px;
            padding: 16px 20px;
        }

        .transcription-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94A3B8;
            margin-bottom: 8px;
        }

        .transcription-text {
            font-size: 15px;
            line-height: 1.5;
            color: #1E293B;
        }

        .transcription-edit-btn {
            margin-top: 8px;
            background: none;
            border: none;
            color: #6C4CC8;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 0;
            font-family: 'Inter', sans-serif;
        }

        .transcription-edit-area {
            width: 100%;
            min-height: 60px;
            border: 1px solid #CBD5E1;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: #1E293B;
            resize: vertical;
            display: none;
        }

        .transcription-edit-area:focus { outline: none; border-color: #6C4CC8; }

        .transcription-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .transcription-actions .btn-sm {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary-sm { background: #6C4CC8; color: white; }
        .btn-ghost-sm { background: #F1F5F9; color: #64748B; }

        /* ===== ANALYSING ZONE ===== */
        .analysing-zone {
            display: none;
            width: 100%;
            margin-top: 24px;
            text-align: center;
        }

        .analysing-zone.visible { display: flex; flex-direction: column; align-items: center; }

        .analysing-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 12px;
        }

        .analysing-text {
            font-size: 15px;
            color: #64748B;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #E2E8F0;
            border-top-color: #6C4CC8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== CONFIRMATION CARD ===== */
        .confirmation-zone {
            display: none;
            width: 100%;
            margin-top: 24px;
        }

        .confirmation-zone.visible { display: block; }

        .confirmation-card {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        .confirmation-header {
            padding: 16px 20px;
            background: linear-gradient(135deg, #F0FDF4 0%, #ECFDF5 100%);
            border-bottom: 1px solid #D1FAE5;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .confirmation-header-icon {
            width: 32px;
            height: 32px;
            background: #10B981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }

        .confirmation-header-text {
            font-weight: 600;
            font-size: 15px;
            color: #065F46;
        }

        .confirmation-action {
            padding: 12px 20px;
            font-size: 14px;
            color: #64748B;
            border-bottom: 1px solid #F1F5F9;
        }

        .confirmation-match {
            padding: 16px 20px;
            border-bottom: 1px solid #F1F5F9;
        }

        .confirmation-match:last-of-type { border-bottom: none; }

        .match-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .match-checkbox {
            width: 18px;
            height: 18px;
            accent-color: #6C4CC8;
            cursor: pointer;
        }

        .match-name {
            font-weight: 600;
            font-size: 14px;
            color: #1E293B;
        }

        .match-type {
            font-size: 11px;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .match-type.seller { background: #FEF3C7; color: #92400E; }
        .match-type.buyer { background: #DBEAFE; color: #1E40AF; }

        .match-confidence {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .match-confidence.high { background: #D1FAE5; color: #065F46; }
        .match-confidence.medium { background: #FEF3C7; color: #92400E; }
        .match-confidence.low { background: #FEE2E2; color: #991B1B; }

        .match-note {
            font-size: 13px;
            color: #475569;
            padding: 8px 12px;
            background: #F8FAFC;
            border-radius: 8px;
            margin-bottom: 6px;
        }

        .match-note-edit {
            width: 100%;
            min-height: 40px;
            border: 1px solid #CBD5E1;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            color: #1E293B;
            resize: vertical;
            display: none;
        }

        .match-next-step {
            font-size: 12px;
            color: #6C4CC8;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .match-reminder {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }

        .match-reminder input[type="date"] {
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            border: 1px solid #E2E8F0;
            border-radius: 6px;
            padding: 4px 8px;
            color: #475569;
        }

        .confirmation-footer {
            padding: 16px 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #F1F5F9;
        }

        .btn-confirm {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-confirm.primary {
            background: #6C4CC8;
            color: white;
        }
        .btn-confirm.primary:hover { background: #5B3FB3; }
        .btn-confirm.primary:disabled { background: #CBD5E1; cursor: default; }

        .btn-confirm.secondary {
            background: #F1F5F9;
            color: #64748B;
        }
        .btn-confirm.secondary:hover { background: #E2E8F0; }

        /* ===== AMBIGUOUS ZONE ===== */
        .ambiguous-zone {
            display: none;
            width: 100%;
            margin-top: 16px;
        }

        .ambiguous-zone.visible { display: block; }

        .ambiguous-card {
            background: #FFFBEB;
            border: 1px solid #FDE68A;
            border-radius: 12px;
            padding: 16px 20px;
        }

        .ambiguous-title {
            font-size: 14px;
            font-weight: 600;
            color: #92400E;
            margin-bottom: 10px;
        }

        .ambiguous-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: white;
            border: 1px solid #FDE68A;
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ambiguous-option:hover { border-color: #6C4CC8; background: #F5F3FF; }

        .ambiguous-option-name { font-weight: 500; font-size: 14px; }
        .ambiguous-option-info { font-size: 12px; color: #64748B; }

        /* ===== NO MATCH ZONE ===== */
        .no-match-zone {
            display: none;
            width: 100%;
            margin-top: 16px;
        }

        .no-match-zone.visible { display: block; }

        .no-match-card {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            border-radius: 12px;
            padding: 16px 20px;
            text-align: center;
        }

        .no-match-text {
            font-size: 14px;
            color: #991B1B;
            margin-bottom: 12px;
        }

        .no-match-names {
            font-weight: 600;
            color: #7F1D1D;
        }

        /* ===== SUCCESS ANIMATION ===== */
        .success-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .success-overlay.visible { display: flex; }

        .success-check {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #10B981;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            animation: success-pop 0.5s ease-out;
        }

        @keyframes success-pop {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .success-text {
            margin-top: 16px;
            font-size: 16px;
            font-weight: 600;
            color: #065F46;
        }

        /* ===== HISTORY ===== */
        .history-zone {
            width: 100%;
            margin-top: 40px;
        }

        .history-title {
            font-family: 'Barlow Semi Condensed', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94A3B8;
            margin-bottom: 12px;
        }

        .history-empty {
            font-size: 13px;
            color: #CBD5E1;
            font-style: italic;
            text-align: center;
            padding: 20px 0;
        }

        .history-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 0;
            border-bottom: 1px solid #F1F5F9;
        }

        .history-item:last-child { border-bottom: none; }

        .history-time {
            font-size: 12px;
            color: #94A3B8;
            font-weight: 500;
            white-space: nowrap;
            min-width: 42px;
        }

        .history-content { flex: 1; }

        .history-action {
            font-size: 13px;
            font-weight: 500;
            color: #1E293B;
        }

        .history-contacts {
            font-size: 12px;
            color: #64748B;
            margin-top: 2px;
        }

        .history-status {
            color: #10B981;
            font-size: 14px;
        }

        /* ===== ERROR ZONE ===== */
        .error-zone {
            display: none;
            width: 100%;
            margin-top: 16px;
        }

        .error-zone.visible { display: block; }

        .error-card {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            border-radius: 12px;
            padding: 16px 20px;
            text-align: center;
        }

        .error-text {
            font-size: 14px;
            color: #991B1B;
            margin-bottom: 12px;
        }

        .btn-retry {
            padding: 10px 24px;
            background: #6C4CC8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            .header {
                display: grid;
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto auto;
                gap: 8px;
                padding: 10px 14px;
                border-radius: 0;
            }

            .logo { grid-column: 1; grid-row: 1; align-self: center; }
            .logo img { width: 60px; }

            .header-actions { display: contents; }

            .user-profile { grid-column: 2; grid-row: 1; justify-self: end; align-self: center; }
            .user-avatar { width: 32px; height: 32px; }
            .user-name { display: none; }

            .nav-tabs {
                grid-column: 1 / -1;
                grid-row: 2;
                justify-content: center;
                gap: 6px;
            }
            .nav-text { display: none; }
            .nav-tab { padding: 8px 14px; font-size: 20px; line-height: 1; }
            .nav-tab span { display: none; }

            .settings-btn { grid-column: 2; grid-row: 1; display: none; }

            .micro-container {
                padding: 20px 20px 100px;
                min-height: calc(100vh - 100px);
            }

            .mic-zone { margin-top: 20px; }

            .mic-btn { width: 140px; height: 140px; font-size: 56px; }

            .mic-waves { width: 140px; height: 140px; }

            @keyframes wave-expand {
                0% { width: 140px; height: 140px; opacity: 1; }
                100% { width: 220px; height: 220px; opacity: 0; }
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <img src="img/Logo_leon.svg" alt="Léon">
            </a>

            <nav class="nav-tabs">
                <a href="index.html" class="nav-tab">
                    <i class="fa-solid fa-house"></i> <span>Vendeurs</span>
                </a>
                <a href="acquereurs.html" class="nav-tab">
                    <i class="fa-solid fa-key"></i> <span>Acquéreurs</span>
                </a>
                <a href="dvf.html" class="nav-tab">
                    <i class="fa-solid fa-chart-simple"></i> <span>Marché</span>
                </a>
                <a href="social.html" class="nav-tab">
                    <i class="fa-solid fa-share-nodes"></i> <span>Social</span>
                </a>
                <a href="micro.html" class="nav-tab active">
                    <i class="fa-solid fa-microphone"></i> <span>Micro</span>
                </a>
            </nav>

            <div class="header-actions">
                <a href="parametres.html" class="settings-btn" title="Paramètres">
                    <i class="fa-solid fa-gear"></i>
                </a>
                <div id="userProfile"></div>
            </div>
        </div>
    </div>

    <div class="micro-container">
        <!-- Zone Micro -->
        <div class="mic-zone">
            <button class="mic-btn idle" id="micBtn">
                <i class="fa-solid fa-microphone"></i>
            </button>
            <div class="mic-waves" id="micWaves"></div>
            <p class="mic-help" id="micHelp">Appuyez pour parler</p>
        </div>

        <!-- Zone Transcription -->
        <div class="transcription-zone" id="transcriptionZone">
            <div class="transcription-card">
                <div class="transcription-label">Transcription</div>
                <div class="transcription-text" id="transcriptionText"></div>
                <button class="transcription-edit-btn" id="transcriptionEditBtn">
                    <i class="fa-solid fa-pen"></i> Corriger
                </button>
                <textarea class="transcription-edit-area" id="transcriptionEditArea"></textarea>
                <div class="transcription-actions" id="transcriptionActions" style="display:none;">
                    <button class="btn-sm btn-primary-sm" id="transcriptionSaveBtn">Analyser</button>
                    <button class="btn-sm btn-ghost-sm" id="transcriptionCancelBtn">Annuler</button>
                </div>
            </div>
        </div>

        <!-- Zone Analyse -->
        <div class="analysing-zone" id="analysingZone">
            <img src="img/Leon.png" alt="Léon" class="analysing-avatar" onerror="this.style.display='none'">
            <p class="analysing-text"><span class="spinner"></span>Léon analyse...</p>
        </div>

        <!-- Zone Confirmation -->
        <div class="confirmation-zone" id="confirmationZone">
            <div class="confirmation-card">
                <div class="confirmation-header">
                    <div class="confirmation-header-icon"><i class="fa-solid fa-check"></i></div>
                    <div class="confirmation-header-text">Léon a compris</div>
                </div>
                <div class="confirmation-action" id="confirmationAction"></div>
                <div id="confirmationMatches"></div>
                <div class="confirmation-footer">
                    <button class="btn-confirm primary" id="confirmBtn">
                        <i class="fa-solid fa-check"></i> Confirmer
                    </button>
                    <button class="btn-confirm secondary" id="editBtn">
                        <i class="fa-solid fa-pen"></i> Modifier
                    </button>
                </div>
            </div>
        </div>

        <!-- Zone Ambiguë -->
        <div class="ambiguous-zone" id="ambiguousZone"></div>

        <!-- Zone Aucun match -->
        <div class="no-match-zone" id="noMatchZone"></div>

        <!-- Zone Erreur -->
        <div class="error-zone" id="errorZone">
            <div class="error-card">
                <p class="error-text" id="errorText">Léon n'a pas pu analyser.</p>
                <button class="btn-retry" id="retryBtn">Réessayer</button>
            </div>
        </div>

        <!-- Historique -->
        <div class="history-zone" id="historyZone">
            <div class="history-title">Historique</div>
            <div id="historyList">
                <p class="history-empty">Aucune dictée pour le moment</p>
            </div>
        </div>
    </div>

    <!-- Overlay succès -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-check"><i class="fa-solid fa-check"></i></div>
        <p class="success-text" id="successText">Notes enregistrées !</p>
    </div>

    <script>
    (async function() {
        // ===== STATE =====
        let recorder = null;
        let currentTranscription = '';
        let currentResult = null;
        let isEditing = false;
        let allLeads = null; // cache
        let history = [];
        let userId = null;

        // ===== DOM =====
        const micBtn = document.getElementById('micBtn');
        const micWaves = document.getElementById('micWaves');
        const micHelp = document.getElementById('micHelp');
        const transcriptionZone = document.getElementById('transcriptionZone');
        const transcriptionText = document.getElementById('transcriptionText');
        const transcriptionEditBtn = document.getElementById('transcriptionEditBtn');
        const transcriptionEditArea = document.getElementById('transcriptionEditArea');
        const transcriptionActions = document.getElementById('transcriptionActions');
        const transcriptionSaveBtn = document.getElementById('transcriptionSaveBtn');
        const transcriptionCancelBtn = document.getElementById('transcriptionCancelBtn');
        const analysingZone = document.getElementById('analysingZone');
        const confirmationZone = document.getElementById('confirmationZone');
        const confirmationAction = document.getElementById('confirmationAction');
        const confirmationMatches = document.getElementById('confirmationMatches');
        const confirmBtn = document.getElementById('confirmBtn');
        const editBtn = document.getElementById('editBtn');
        const ambiguousZone = document.getElementById('ambiguousZone');
        const noMatchZone = document.getElementById('noMatchZone');
        const errorZone = document.getElementById('errorZone');
        const errorText = document.getElementById('errorText');
        const retryBtn = document.getElementById('retryBtn');
        const historyList = document.getElementById('historyList');
        const successOverlay = document.getElementById('successOverlay');
        const successText = document.getElementById('successText');

        // ===== INIT =====
        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return;
            userId = session.user.id;

            recorder = new AudioRecorder({
                maxDuration: 30000,
                silenceTimeout: 3000,
                silenceThreshold: 0.01,
                onStateChange: handleRecorderState
            });
        }

        function handleRecorderState(state, msg) {
            if (state === 'recording') {
                setMicState('recording');
            } else if (state === 'transcribing') {
                setMicState('transcribing');
            } else if (state === 'error') {
                setMicState('idle');
                showError(msg || 'Erreur d\'enregistrement');
            }
        }

        // ===== MIC STATES =====
        function setMicState(state) {
            micBtn.className = 'mic-btn';
            micWaves.style.display = 'none';

            switch (state) {
                case 'idle':
                    micBtn.classList.add('idle');
                    micBtn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
                    micHelp.textContent = 'Appuyez pour parler';
                    micBtn.disabled = false;
                    break;
                case 'recording':
                    micBtn.classList.add('recording');
                    micBtn.innerHTML = '<i class="fa-solid fa-stop"></i>';
                    micWaves.style.display = 'block';
                    micHelp.textContent = 'Parlez... (appuyez pour arrêter)';
                    micBtn.disabled = false;
                    break;
                case 'transcribing':
                    micBtn.classList.add('processing');
                    micBtn.innerHTML = '<span class="spinner" style="border-top-color:white;width:32px;height:32px;border-width:3px;margin:0"></span>';
                    micHelp.textContent = 'Transcription en cours...';
                    micBtn.disabled = true;
                    break;
                case 'analysing':
                    micBtn.classList.add('processing');
                    micBtn.innerHTML = '<span class="spinner" style="border-top-color:white;width:32px;height:32px;border-width:3px;margin:0"></span>';
                    micHelp.textContent = 'Léon analyse...';
                    micBtn.disabled = true;
                    break;
            }
        }

        // ===== HIDE ALL RESULT ZONES =====
        function hideAllZones() {
            transcriptionZone.classList.remove('visible');
            analysingZone.classList.remove('visible');
            confirmationZone.classList.remove('visible');
            ambiguousZone.classList.remove('visible');
            noMatchZone.classList.remove('visible');
            errorZone.classList.remove('visible');
        }

        // ===== RECORD FLOW =====
        micBtn.addEventListener('click', async () => {
            if (recorder && recorder.isRecording) {
                recorder.stop();
                return;
            }

            hideAllZones();
            currentResult = null;
            isEditing = false;

            try {
                const text = await recorder.record();
                if (!text || !text.trim()) {
                    setMicState('idle');
                    return;
                }

                currentTranscription = text.trim();
                showTranscription(currentTranscription);
                await analyseTranscription(currentTranscription);
            } catch (err) {
                setMicState('idle');
                if (err.message) showError(err.message);
            }
        });

        // ===== SHOW TRANSCRIPTION =====
        function showTranscription(text) {
            transcriptionText.textContent = text;
            transcriptionEditArea.value = text;
            transcriptionEditBtn.style.display = '';
            transcriptionEditArea.style.display = 'none';
            transcriptionActions.style.display = 'none';
            transcriptionZone.classList.add('visible');
        }

        // ===== EDIT TRANSCRIPTION =====
        transcriptionEditBtn.addEventListener('click', () => {
            transcriptionEditArea.value = currentTranscription;
            transcriptionText.style.display = 'none';
            transcriptionEditBtn.style.display = 'none';
            transcriptionEditArea.style.display = '';
            transcriptionActions.style.display = '';
            transcriptionEditArea.focus();
        });

        transcriptionCancelBtn.addEventListener('click', () => {
            transcriptionText.style.display = '';
            transcriptionEditBtn.style.display = '';
            transcriptionEditArea.style.display = 'none';
            transcriptionActions.style.display = 'none';
        });

        transcriptionSaveBtn.addEventListener('click', async () => {
            const newText = transcriptionEditArea.value.trim();
            if (!newText) return;
            currentTranscription = newText;
            transcriptionText.textContent = newText;
            transcriptionText.style.display = '';
            transcriptionEditBtn.style.display = '';
            transcriptionEditArea.style.display = 'none';
            transcriptionActions.style.display = 'none';
            await analyseTranscription(newText);
        });

        // ===== LOAD LEADS (cached) =====
        async function loadUserLeads() {
            if (allLeads) return allLeads;

            const [sellersRes, buyersRes] = await Promise.all([
                supabaseClient.from('sellers')
                    .select('id, first_name, last_name, phone, address, status')
                    .eq('user_id', userId)
                    .order('updated_at', { ascending: false })
                    .limit(500),
                supabaseClient.from('buyers')
                    .select('id, first_name, last_name, phone, sector, status')
                    .eq('user_id', userId)
                    .order('updated_at', { ascending: false })
                    .limit(500)
            ]);

            const sellers = (sellersRes.data || []).map(s => ({
                id: s.id, type: 'seller',
                first_name: s.first_name, last_name: s.last_name,
                phone: s.phone, address: s.address
            }));
            const buyers = (buyersRes.data || []).map(b => ({
                id: b.id, type: 'buyer',
                first_name: b.first_name, last_name: b.last_name,
                phone: b.phone, sector: b.sector
            }));

            allLeads = [...sellers, ...buyers];
            return allLeads;
        }

        // ===== PRE-FILTER LEADS =====
        function preFilterLeads(leads, transcription) {
            const words = transcription.toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .split(/\s+/)
                .filter(w => w.length > 2);

            const matched = leads.filter(lead => {
                const fullName = `${lead.first_name || ''} ${lead.last_name || ''}`
                    .toLowerCase()
                    .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                return words.some(word => fullName.includes(word));
            });

            // Si aucun pré-match, envoyer les 50 plus récents
            if (matched.length === 0) return leads.slice(0, 50);
            return matched;
        }

        // ===== ANALYSE =====
        async function analyseTranscription(text) {
            setMicState('analysing');
            analysingZone.classList.add('visible');
            confirmationZone.classList.remove('visible');
            ambiguousZone.classList.remove('visible');
            noMatchZone.classList.remove('visible');
            errorZone.classList.remove('visible');

            try {
                const leads = await loadUserLeads();
                const relevant = preFilterLeads(leads, text);

                const today = new Date().toISOString().split('T')[0];
                const headers = await getAuthHeaders();

                const response = await fetch('/api/parse-voice-note', {
                    method: 'POST',
                    headers,
                    body: JSON.stringify({ transcription: text, leads: relevant, today })
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.error || 'Analyse échouée');
                }

                currentResult = await response.json();
                analysingZone.classList.remove('visible');
                setMicState('idle');
                showResult(currentResult);
            } catch (err) {
                analysingZone.classList.remove('visible');
                setMicState('idle');
                showError(err.message || 'Erreur lors de l\'analyse');
            }
        }

        // ===== SHOW RESULT =====
        function showResult(result) {
            const hasMatches = result.contacts_matched && result.contacts_matched.length > 0;
            const hasAmbiguous = result.ambiguous_contacts && result.ambiguous_contacts.length > 0;
            const hasUnmatched = result.unmatched_contacts && result.unmatched_contacts.length > 0;

            if (hasMatches) {
                showConfirmation(result);
            }

            if (hasAmbiguous) {
                showAmbiguous(result.ambiguous_contacts);
            }

            if (hasUnmatched && !hasMatches && !hasAmbiguous) {
                showNoMatch(result.unmatched_contacts);
            }

            if (!hasMatches && !hasAmbiguous && !hasUnmatched) {
                showNoMatch(['(aucun contact identifié)']);
            }
        }

        // ===== CONFIRMATION =====
        function showConfirmation(result) {
            confirmationAction.textContent = result.action_understood || '';

            let html = '';
            result.contacts_matched.forEach((match, i) => {
                const typeClass = match.lead_type === 'seller' ? 'seller' : 'buyer';
                const typeLabel = match.lead_type === 'seller' ? 'vendeur' : 'acquéreur';
                const confClass = match.confidence || 'high';
                const confLabel = { high: 'sûr', medium: 'probable', low: 'incertain' }[confClass] || confClass;

                html += `
                <div class="confirmation-match" data-index="${i}">
                    <div class="match-header">
                        <input type="checkbox" class="match-checkbox" data-index="${i}" checked>
                        <span class="match-name">${escHtml(match.lead_name)}</span>
                        <span class="match-type ${typeClass}">${typeLabel}</span>
                        <span class="match-confidence ${confClass}">${confLabel}</span>
                    </div>
                    <div class="match-note" data-index="${i}">${escHtml(match.note_content)}</div>
                    <textarea class="match-note-edit" data-index="${i}">${escHtml(match.note_content)}</textarea>
                    ${match.next_step ? `<div class="match-next-step"><i class="fa-solid fa-lightbulb"></i> ${escHtml(match.next_step)}</div>` : ''}
                    ${match.reminder_date ? `
                    <div class="match-reminder">
                        <i class="fa-solid fa-calendar"></i>
                        <input type="date" data-index="${i}" value="${match.reminder_date}">
                    </div>` : ''}
                </div>`;
            });

            confirmationMatches.innerHTML = html;
            confirmationZone.classList.add('visible');
        }

        // ===== EDIT MODE =====
        editBtn.addEventListener('click', () => {
            isEditing = !isEditing;
            const notes = confirmationMatches.querySelectorAll('.match-note');
            const edits = confirmationMatches.querySelectorAll('.match-note-edit');

            notes.forEach(el => el.style.display = isEditing ? 'none' : '');
            edits.forEach(el => el.style.display = isEditing ? '' : 'none');

            editBtn.innerHTML = isEditing
                ? '<i class="fa-solid fa-eye"></i> Aperçu'
                : '<i class="fa-solid fa-pen"></i> Modifier';
        });

        // ===== CONFIRM =====
        confirmBtn.addEventListener('click', async () => {
            if (!currentResult || !currentResult.contacts_matched) return;
            confirmBtn.disabled = true;
            confirmBtn.innerHTML = '<span class="spinner" style="border-top-color:white;width:16px;height:16px;margin:0"></span> Enregistrement...';

            try {
                const matches = currentResult.contacts_matched;
                let saved = 0;

                for (let i = 0; i < matches.length; i++) {
                    const match = matches[i];
                    const checkbox = confirmationMatches.querySelector(`.match-checkbox[data-index="${i}"]`);
                    if (checkbox && !checkbox.checked) continue;

                    // Note content (may be edited)
                    const editArea = confirmationMatches.querySelector(`.match-note-edit[data-index="${i}"]`);
                    const noteContent = (editArea && editArea.value.trim()) || match.note_content;

                    // Insert note
                    const noteCol = match.lead_type === 'seller' ? 'seller_id' : 'buyer_id';
                    await supabaseClient.from('lead_notes').insert({
                        user_id: userId,
                        [noteCol]: match.lead_id,
                        content: noteContent
                    });

                    // Update reminder if provided
                    const dateInput = confirmationMatches.querySelector(`input[type="date"][data-index="${i}"]`);
                    const reminderDate = dateInput ? dateInput.value : match.reminder_date;

                    const table = match.lead_type === 'seller' ? 'sellers' : 'buyers';
                    const updates = { updated_at: new Date().toISOString() };
                    if (reminderDate) updates.reminder = reminderDate;

                    await supabaseClient.from(table)
                        .update(updates)
                        .eq('id', match.lead_id)
                        .eq('user_id', userId);

                    saved++;
                }

                // Add to history
                addToHistory(currentResult, saved);

                // Show success
                successText.textContent = saved === 1
                    ? '1 note enregistrée !'
                    : `${saved} notes enregistrées !`;
                successOverlay.classList.add('visible');

                setTimeout(() => {
                    successOverlay.classList.remove('visible');
                    hideAllZones();
                    setMicState('idle');
                    currentResult = null;
                    allLeads = null; // Invalider le cache des leads
                }, 1800);

            } catch (err) {
                console.error('Confirm error:', err);
                showError('Erreur lors de l\'enregistrement : ' + err.message);
            } finally {
                confirmBtn.disabled = false;
                confirmBtn.innerHTML = '<i class="fa-solid fa-check"></i> Confirmer';
            }
        });

        // ===== AMBIGUOUS =====
        function showAmbiguous(ambiguousContacts) {
            let html = '';
            ambiguousContacts.forEach(amb => {
                html += `<div class="ambiguous-card" style="margin-bottom:10px">
                    <div class="ambiguous-title">Plusieurs "${escHtml(amb.name_mentioned)}" trouvés :</div>`;

                amb.possible_matches.forEach(pm => {
                    html += `<div class="ambiguous-option" onclick="resolveAmbiguous('${escHtml(amb.name_mentioned)}', '${pm.lead_id}', '${pm.lead_type || 'seller'}', '${escHtml(pm.lead_name)}')">
                        <span class="ambiguous-option-name">${escHtml(pm.lead_name)}</span>
                        <span class="ambiguous-option-info">${pm.lead_type === 'buyer' ? 'acquéreur' : 'vendeur'}</span>
                    </div>`;
                });
                html += '</div>';
            });

            ambiguousZone.innerHTML = html;
            ambiguousZone.classList.add('visible');
        }

        // Global for onclick
        window.resolveAmbiguous = function(nameMentioned, leadId, leadType, leadName) {
            // Add the resolved match to currentResult
            if (!currentResult) return;
            if (!currentResult.contacts_matched) currentResult.contacts_matched = [];

            currentResult.contacts_matched.push({
                lead_id: leadId,
                lead_type: leadType,
                lead_name: leadName,
                confidence: 'high',
                note_content: `📝 ${currentResult.action_understood || currentTranscription}`,
                next_step: null,
                reminder_date: null
            });

            // Remove from ambiguous
            if (currentResult.ambiguous_contacts) {
                currentResult.ambiguous_contacts = currentResult.ambiguous_contacts.filter(
                    a => a.name_mentioned !== nameMentioned
                );
            }

            ambiguousZone.classList.remove('visible');
            showConfirmation(currentResult);
        };

        // ===== NO MATCH =====
        function showNoMatch(names) {
            noMatchZone.innerHTML = `
                <div class="no-match-card">
                    <p class="no-match-text">
                        Léon n'a pas trouvé de lead correspondant à
                        <span class="no-match-names">${names.map(n => escHtml(n)).join(', ')}</span>
                    </p>
                    <button class="btn-retry" onclick="window.location.href='index.html'">
                        <i class="fa-solid fa-plus"></i> Créer un lead vendeur
                    </button>
                    <button class="btn-retry" style="margin-left:6px;background:#2E86DE" onclick="window.location.href='acquereurs.html'">
                        <i class="fa-solid fa-plus"></i> Créer un lead acquéreur
                    </button>
                </div>`;
            noMatchZone.classList.add('visible');
        }

        // ===== ERROR =====
        function showError(msg) {
            errorText.textContent = msg || 'Léon n\'a pas pu analyser.';
            errorZone.classList.add('visible');
        }

        retryBtn.addEventListener('click', async () => {
            errorZone.classList.remove('visible');
            if (currentTranscription) {
                await analyseTranscription(currentTranscription);
            } else {
                setMicState('idle');
            }
        });

        // ===== HISTORY =====
        function addToHistory(result, savedCount) {
            const now = new Date();
            const time = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            const contacts = (result.contacts_matched || [])
                .map(m => {
                    const parts = m.lead_name.split(' ');
                    const first = parts[0] || '';
                    const lastInitial = parts.length > 1 ? parts[parts.length - 1][0] + '.' : '';
                    return `${first} ${lastInitial}`.trim();
                })
                .join(' + ');

            history.unshift({
                time,
                action: result.action_understood || 'Action enregistrée',
                contacts,
                count: savedCount
            });

            // Keep last 10
            if (history.length > 10) history = history.slice(0, 10);
            renderHistory();
        }

        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '<p class="history-empty">Aucune dictée pour le moment</p>';
                return;
            }

            historyList.innerHTML = history.map(h => `
                <div class="history-item">
                    <span class="history-time">${h.time}</span>
                    <div class="history-content">
                        <div class="history-action">${escHtml(h.action)}</div>
                        <div class="history-contacts">${escHtml(h.contacts)}</div>
                    </div>
                    <span class="history-status"><i class="fa-solid fa-circle-check"></i></span>
                </div>
            `).join('');
        }

        // ===== UTILS =====
        function escHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ===== START =====
        init();
    })();
    </script>
</body>
</html>
