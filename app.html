<!--
  Léon — Shell desktop multi-onglets (app.html)
  Coquille « façon navigateur » : une barre d'onglets en haut, chaque rubrique chargée
  dans un <iframe> qui reste vivant. Point d'entrée desktop (home.html y redirige).
  Mobile → redirige vers home.html (le shell est desktop-only).
  Auth requise (js/auth.js) | Logique d'onglets : js/tab-shell.js
-->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Léon.</title>
    <link rel="icon" type="image/svg+xml" href="/fav_leon.svg">

    <!-- Mobile : le shell n'a pas de sens sur petit écran → retour à l'accueil mobile -->
    <script>
        if (window.innerWidth <= 768) location.replace('home.html');
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bar-h: 50px;
            --ink: #243B53;
        }

        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            color: var(--ink);
        }

        /* ===== BARRE D'ONGLETS (foncée, façon barre de navigateur) ===== */
        .shell-bar {
            height: var(--bar-h);
            background: #1f2937;
            display: flex;
            align-items: stretch;
            padding: 0 8px 0 0;
            position: relative;
            z-index: 10;
        }

        /* Logo Léon = clic → active l'onglet Accueil.
           filter brightness(0) invert(1) → rend le logo (bleu marine) BLANC,
           visible sur la barre foncée, sans nouveau fichier image. */
        .shell-logo {
            display: flex;
            align-items: center;
            padding: 0 20px 0 18px;
            background: transparent;
            border: none;
            cursor: pointer;
            flex-shrink: 0;
        }
        .shell-logo img {
            height: 26px;
            width: auto;
            filter: brightness(0) invert(1);
        }

        /* Bande d'onglets : largeur naturelle, scroll horizontal si débordement.
           flex 0 1 auto + min-width 0 → ne pousse pas le "+" à droite, mais peut
           rétrécir/scroller si beaucoup d'onglets. */
        .shell-tabs {
            display: flex;
            align-items: stretch;
            gap: 2px;
            flex: 0 1 auto;
            min-width: 0;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
        }
        .shell-tabs::-webkit-scrollbar { display: none; }

        /* Espace flexible entre le "+" et la zone droite */
        .shell-spacer { flex: 1 1 auto; }

        .shell-tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 14px;
            max-width: 210px;
            min-width: 120px;
            background: #2b3544;
            color: #cbd5e1;
            border: none;
            border-top: 2px solid transparent;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s, color 0.15s;
            align-self: flex-end;
            height: calc(var(--bar-h) - 6px);
            border-radius: 8px 8px 0 0;
        }
        .shell-tab:hover { background: #34404f; color: #fff; }
        .shell-tab.active {
            background: #f0f2f5;
            color: var(--ink);
            border-top-color: #667eea;
        }
        .shell-tab-ico { font-size: 12px; opacity: 0.85; flex-shrink: 0; }
        .shell-tab-label { overflow: hidden; text-overflow: ellipsis; }
        .shell-tab-close {
            margin-left: 2px;
            font-size: 17px;
            line-height: 1;
            opacity: 0.5;
            border-radius: 4px;
            width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .shell-tab-close:hover { opacity: 1; background: rgba(0,0,0,0.18); }

        /* Bouton "+" + menu */
        .shell-plus-wrap { position: relative; display: flex; align-items: center; flex-shrink: 0; }
        .shell-plus-btn {
            width: 32px; height: 32px;
            margin: 0 6px;
            border: none;
            border-radius: 8px;
            background: #2b3544;
            color: #cbd5e1;
            font-size: 17px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .shell-plus-btn:hover { background: var(--gradient); color: #fff; }

        .shell-plus-menu {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 6px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.2);
            padding: 6px;
            min-width: 200px;
            z-index: 100;
        }
        .shell-plus-menu.open { display: block; }
        .shell-plus-item {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px 12px;
            border: none;
            background: none;
            text-align: left;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--ink);
            border-radius: 7px;
            cursor: pointer;
        }
        .shell-plus-item:hover { background: #F3F4F6; }
        .shell-plus-item i { width: 18px; text-align: center; color: #667eea; }

        /* Zone droite : cloche + profil */
        .shell-right {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 6px 0 10px;
            flex-shrink: 0;
        }
        .alert-bell {
            position: relative; background: none; border: none;
            color: #cbd5e1; font-size: 17px; cursor: pointer; padding: 6px;
        }
        .alert-bell:hover { color: #fff; }
        .alert-badge {
            position: absolute; top: 0; right: 0;
            background: #EF4444; color: #fff; font-size: 10px; font-weight: 600;
            padding: 1px 5px; border-radius: 10px; min-width: 16px; text-align: center;
        }
        .user-profile { display: flex; align-items: center; gap: 8px; cursor: pointer; position: relative; }
        .user-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
        .user-initials {
            width: 30px; height: 30px; border-radius: 50%;
            background: #667eea; color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 600;
        }
        .user-name { color: #e2e8f0; font-weight: 500; font-size: 13px; white-space: nowrap; }
        .user-dropdown {
            display: none; position: absolute; top: calc(100% + 10px); right: 0;
            background: #fff; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            min-width: 180px; z-index: 200; overflow: hidden; border: 1px solid #E5E7EB;
        }
        .user-dropdown.active { display: block; }
        .user-dropdown-item {
            display: block; width: 100%; padding: 12px 16px; border: none; background: none;
            text-align: left; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
            color: var(--ink); cursor: pointer; text-decoration: none;
        }
        .user-dropdown-item:hover { background: #F3F4F6; }
        .export-dropdown-separator { height: 1px; background: #E5E7EB; }

        /* ===== ZONE DES VUES (iframes empilées) ===== */
        .shell-views {
            position: relative;
            height: calc(100vh - var(--bar-h));
            background: #f0f2f5;
        }
        .shell-view {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
        .shell-view.active { display: block; }
    </style>
</head>
<body>

    <!-- Barre d'onglets -->
    <div class="shell-bar">
        <!-- Logo = Accueil -->
        <button type="button" class="shell-logo" onclick="LeonShell.activate('home')" title="Accueil">
            <img src="img/Logo_leon.svg" alt="Léon">
        </button>

        <!-- Onglets ouverts (rendus par tab-shell.js) -->
        <div class="shell-tabs" id="shellTabs"></div>

        <!-- Bouton "+" : ouvrir une rubrique (juste après les onglets) -->
        <div class="shell-plus-wrap">
            <button type="button" class="shell-plus-btn" id="shellPlusBtn" title="Ouvrir une rubrique">+</button>
            <div class="shell-plus-menu" id="shellPlusMenu"></div>
        </div>

        <!-- Espace flexible : pousse cloche/profil à l'extrême droite -->
        <div class="shell-spacer"></div>

        <!-- Zone droite : cloche relances + profil utilisateur (auth.js) -->
        <div class="shell-right">
            <button class="alert-bell" id="alertBell" title="Relances du jour">
                <i class="fa-solid fa-bell"></i>
                <span class="alert-badge" id="alertBadge" style="display: none;">0</span>
            </button>
            <div class="user-profile" id="userProfile"><!-- injecté par auth.js --></div>
        </div>
    </div>

    <!-- Pile des iframes (rendues par tab-shell.js) -->
    <div class="shell-views" id="shellViews"></div>

    <script src="js/relance-widget.js"></script>
    <script src="js/tab-shell.js?v=20260610c"></script>
</body>
</html>
